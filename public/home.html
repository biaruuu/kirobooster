<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KiroBoost - Dashboard</title>

    <link rel="shortcut icon" href="img/fav-icon.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        /* ─── Reset ─── */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0; padding: 0;
            font-family: 'Outfit', sans-serif !important;
        }

        *::selection { background: #4C4948 !important; color: #fff; }

        html, body {
            min-height: 100vh;
            background: #000;
            color: #fff;
            overflow-x: hidden;
        }

        /* ─── CSS Variables ─── */
        :root {
            --bg:        #000000;
            --surface:   #0d0d0d;
            --card:      #111111;
            --border:    rgba(255,255,255,0.08);
            --muted:     #B4B4B4;
            --accent:    #ffffff;
            --green:     #22c55e;
            --red:       #ef4444;
            --yellow:    #eab308;
            --blue:      #3b82f6;
        }

        /* ─── Scrollbar ─── */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

        /* ─── Layout ─── */
        #app { display: flex; flex-direction: column; min-height: 100vh; }

        /* ─── Navbar ─── */
        #topnav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(0,0,0,0.92);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            height: 60px;
        }

        /* Logo */
        .kiro-logo { display: inline-flex; align-items: baseline; letter-spacing: -0.04em; user-select: none; }
        .logo-kiro  { font-weight: 800; color: #fff; font-style: italic; font-size: 1.4rem; }
        .logo-boost { font-weight: 300; color: rgba(255,255,255,0.4); font-size: 1.4rem; letter-spacing: -0.02em; }

        /* Nav right */
        .nav-right { display: flex; align-items: center; gap: 12px; }

        .nav-icon-btn {
            position: relative;
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
            transition: color .2s, background .2s;
            display: flex; align-items: center; justify-content: center;
        }
        .nav-icon-btn:hover { color: #fff; background: rgba(255,255,255,0.06); }

        .notif-badge {
            position: absolute;
            top: 2px; right: 2px;
            min-width: 16px; height: 16px;
            background: var(--red);
            border-radius: 8px;
            font-size: 0.6rem;
            font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            padding: 0 3px;
            display: none;
        }
        .notif-badge.show { display: flex; }

        /* Avatar small */
        .nav-avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: #222;
            border: 1.5px solid var(--border);
            overflow: hidden;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--muted);
            transition: border-color .2s;
            flex-shrink: 0;
        }
        .nav-avatar:hover { border-color: rgba(255,255,255,0.3); }
        .nav-avatar img { width: 100%; height: 100%; object-fit: cover; }

        /* ─── Main ─── */
        #main { flex: 1; padding: 1.5rem; max-width: 1100px; margin: 0 auto; width: 100%; }

        /* ─── Profile Hero ─── */
        .profile-hero {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 1.25rem;
        }

        .hero-banner {
            height: 90px;
            background: #111;
            position: relative;
        }

        .hero-body {
            padding: 0 1.5rem 1.25rem;
            position: relative;
        }

        .hero-avatar {
            width: 72px; height: 72px;
            border-radius: 50%;
            border: 3px solid #000;
            background: #222;
            margin-top: -36px;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem;
            font-weight: 800;
            color: #fff;
            position: relative;
            flex-shrink: 0;
        }
        .hero-avatar img { width: 100%; height: 100%; object-fit: cover; }

        .hero-info { margin-top: .6rem; }

        .hero-username {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--green);
            flex-shrink: 0;
        }
        .status-dot.offline { background: #555; }

        .hero-bio {
            color: var(--muted);
            font-size: 0.85rem;
            margin-top: 3px;
            line-height: 1.5;
        }

        .hero-status-text {
            font-size: 0.78rem;
            color: #666;
            margin-top: 2px;
        }

        .badge-pill {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            background: rgba(255,255,255,0.08);
            color: var(--muted);
            border: 1px solid var(--border);
        }
        .badge-pill.active { background: rgba(34,197,94,0.12); color: #86efac; border-color: rgba(34,197,94,0.25); }
        .badge-pill.admin  { background: rgba(59,130,246,0.12); color: #93c5fd; border-color: rgba(59,130,246,0.25); }

        /* ─── Stats Grid ─── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: .85rem;
            margin-bottom: 1.25rem;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.1rem 1.1rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 6px;
            transition: border-color .2s;
        }
        .stat-card:hover { border-color: rgba(255,255,255,0.15); }

        .stat-icon {
            width: 34px; height: 34px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
        }
        .stat-icon.green { background: rgba(34,197,94,0.12); color: #86efac; }
        .stat-icon.blue  { background: rgba(59,130,246,0.12); color: #93c5fd; }
        .stat-icon.orange{ background: rgba(249,115,22,0.12); color: #fdba74; }
        .stat-icon.purple{ background: rgba(168,85,247,0.12); color: #d8b4fe; }

        .stat-value {
            font-size: 1.65rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--muted);
            font-weight: 500;
        }

        /* ─── Grid 2-col ─── */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
            margin-bottom: 1.25rem;
        }

        /* ─── Section Card ─── */
        .section-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: .9rem 1.1rem;
            border-bottom: 1px solid var(--border);
        }

        .section-title {
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .section-link {
            font-size: 0.75rem;
            color: var(--muted);
            text-decoration: none;
            font-weight: 500;
            transition: color .2s;
        }
        .section-link:hover { color: #fff; }

        /* ─── Chart ─── */
        .chart-wrap {
            padding: 1rem 1.1rem;
            height: 150px;
        }

        canvas { display: block; }

        /* ─── Orders table ─── */
        .order-list { padding: 0; }

        .order-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: .75rem 1.1rem;
            border-bottom: 1px solid var(--border);
            transition: background .15s;
        }
        .order-row:last-child { border-bottom: none; }
        .order-row:hover { background: rgba(255,255,255,0.02); }

        .order-icon {
            width: 32px; height: 32px;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            color: var(--muted);
        }

        .order-main { flex: 1; min-width: 0; }
        .order-ref  { font-size: 0.82rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .order-meta { font-size: 0.72rem; color: var(--muted); }

        .order-right { text-align: right; flex-shrink: 0; }
        .order-qty   { font-size: 0.82rem; font-weight: 700; }
        .order-date  { font-size: 0.7rem; color: var(--muted); }

        /* Status chips */
        .chip {
            display: inline-block;
            padding: 2px 7px;
            border-radius: 20px;
            font-size: 0.68rem;
            font-weight: 600;
        }
        .chip.pending    { background: rgba(234,179,8,0.12);   color: #fde047; }
        .chip.processing { background: rgba(59,130,246,0.12);  color: #93c5fd; }
        .chip.completed  { background: rgba(34,197,94,0.12);   color: #86efac; }
        .chip.cancelled  { background: rgba(239,68,68,0.12);   color: #fca5a5; }
        .chip.refunded   { background: rgba(168,85,247,0.12);  color: #d8b4fe; }
        .chip.partial    { background: rgba(249,115,22,0.12);  color: #fdba74; }

        /* ─── Inbox ─── */
        .inbox-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: .75rem 1.1rem;
            border-bottom: 1px solid var(--border);
            transition: background .15s;
            cursor: pointer;
        }
        .inbox-row:last-child { border-bottom: none; }
        .inbox-row:hover { background: rgba(255,255,255,0.02); }
        .inbox-row.unread .inbox-title { color: #fff; font-weight: 700; }
        .inbox-row.unread .inbox-dot { opacity: 1; }

        .inbox-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--blue);
            flex-shrink: 0;
            margin-top: 5px;
            opacity: 0;
        }

        .inbox-body { flex: 1; min-width: 0; }
        .inbox-title { font-size: 0.82rem; font-weight: 500; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .inbox-preview { font-size: 0.72rem; color: #555; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .inbox-time { font-size: 0.68rem; color: #444; flex-shrink: 0; }

        /* ─── Quick Actions ─── */
        .quick-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: .85rem;
            margin-bottom: 1.25rem;
        }

        .quick-btn {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.1rem .8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: border-color .2s, background .2s, transform .15s;
            color: #fff;
        }
        .quick-btn:hover {
            border-color: rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.04);
            transform: translateY(-2px);
            color: #fff;
        }
        .quick-btn:active { transform: translateY(0); }

        .quick-icon {
            width: 40px; height: 40px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
        }

        .quick-label { font-size: 0.78rem; font-weight: 600; text-align: center; }

        /* ─── Empty states ─── */
        .empty-state {
            padding: 2rem 1rem;
            text-align: center;
            color: #444;
            font-size: 0.82rem;
        }
        .empty-state svg { margin-bottom: .5rem; opacity: .3; }

        /* ─── Skeleton loader ─── */
        .skeleton {
            background: linear-gradient(90deg, #1a1a1a 25%, #222 50%, #1a1a1a 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 6px;
        }

        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ─── Toast ─── */
        #toast {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            background: #111;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: .7rem 1rem;
            font-size: 0.82rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 9999;
            transform: translateY(20px);
            opacity: 0;
            transition: transform .3s, opacity .3s;
            pointer-events: none;
            max-width: 300px;
        }
        #toast.show { transform: translateY(0); opacity: 1; }
        #toast.success { border-color: rgba(34,197,94,.3); color: #86efac; }
        #toast.error   { border-color: rgba(239,68,68,.3);  color: #fca5a5; }

        /* ─── Footer ─── */
        footer {
            border-top: 1px solid var(--border);
            padding: 1rem;
            text-align: center;
            color: #333;
            font-size: 0.75rem;
        }
        footer span { color: #555; font-weight: 600; }

        /* ─── Responsive ─── */
        @media (max-width: 768px) {
            #main { padding: 1rem .75rem; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .grid-2 { grid-template-columns: 1fr; }
            .quick-grid { grid-template-columns: repeat(2, 1fr); }
            .stat-value { font-size: 1.35rem; }
        }

        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .quick-grid { grid-template-columns: repeat(2, 1fr); }
            #topnav { padding: 0 1rem; }
            .hero-body { padding: 0 1rem 1rem; }
        }

        /* Dropdown */
        .dropdown-menu-dark {
            background: #111 !important;
            border: 1px solid var(--border) !important;
            border-radius: 10px !important;
        }
        .dropdown-item {
            color: var(--muted) !important;
            font-size: 0.82rem !important;
            font-weight: 500 !important;
            padding: .45rem .9rem !important;
            display: flex !important;
            align-items: center !important;
            gap: 8px !important;
        }
        .dropdown-item:hover { background: rgba(255,255,255,0.06) !important; color: #fff !important; }
        .dropdown-item.text-danger-soft { color: #fca5a5 !important; }
        .dropdown-divider { border-color: var(--border) !important; }
    </style>
</head>
<body>

<div id="app">

    <!-- ═══ NAVBAR ═══ -->
    <nav id="topnav">
        <!-- Logo -->
        <a href="/home" class="text-decoration-none">
            <span class="kiro-logo">
                <span class="logo-kiro">Kiro</span><span class="logo-boost">Boost</span>
            </span>
        </a>

        <!-- Right side -->
        <div class="nav-right">
            <!-- Inbox bell -->
            <a href="/inbox" class="nav-icon-btn" id="inboxBtn" title="Inbox">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                    <path d="M13.73 21a2 2 0 01-3.46 0"/>
                </svg>
                <span class="notif-badge" id="inboxBadge">0</span>
            </a>

            <!-- User avatar dropdown -->
            <div class="dropdown">
                <div class="nav-avatar" id="navAvatar" data-bs-toggle="dropdown" aria-expanded="false">
                    <span id="navAvatarInitial">?</span>
                </div>
                <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark">
                    <li>
                        <div class="px-3 py-2" style="border-bottom:1px solid var(--border);margin-bottom:4px;">
                            <div style="font-size:.82rem;font-weight:700;color:#fff;" id="dropUsername">—</div>
                            <div style="font-size:.72rem;color:#555;" id="dropRole">User</div>
                        </div>
                    </li>
                    <li><a class="dropdown-item" href="/profile">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        Profile
                    </a></li>
                    <li><a class="dropdown-item" href="/cookies">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
                        My Cookies
                    </a></li>
                    <li><a class="dropdown-item" href="/transactions">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 14l-4-4 4-4"/><path d="M5 10h11a4 4 0 010 8h-1"/></svg>
                        Transactions
                    </a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item text-danger-soft" href="#" onclick="logout()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                        Sign Out
                    </a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ═══ MAIN ═══ -->
    <main id="main">

        <!-- ── Profile Hero ── -->
        <div class="profile-hero">
            <div class="hero-banner" id="heroBanner">
                <!-- Banner filled by JS -->
            </div>
            <div class="hero-body">
                <div class="d-flex align-items-end justify-content-between flex-wrap gap-2">
                    <div class="d-flex align-items-end gap-3">
                        <div class="hero-avatar" id="heroAvatar">
                            <span id="heroAvatarInitial">?</span>
                        </div>
                        <div class="hero-info">
                            <div class="hero-username">
                                <span id="heroUsername">Loading...</span>
                                <span class="status-dot" id="statusDot"></span>
                                <span class="badge-pill active" id="activeChip" style="display:none;">Active</span>
                                <span class="badge-pill admin" id="adminChip" style="display:none;">Admin</span>
                            </div>
                            <div class="hero-bio" id="heroBio"></div>
                            <div class="hero-status-text" id="heroStatusText"></div>
                        </div>
                    </div>
                    <a href="/boost" class="btn btn-sm rounded-2 fw-bold"
                       style="background:#fff;color:#000;font-size:.8rem;padding:.4rem .9rem;">
                        + New Boost
                    </a>
                </div>
            </div>
        </div>

        <!-- ── Stats Cards ── -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon green">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                </div>
                <div class="stat-value" id="statShares">—</div>
                <div class="stat-label">Total Shares</div>
            </div>

            <div class="stat-card">
                <div class="stat-icon blue">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
                </div>
                <div class="stat-value" id="statCookies">—</div>
                <div class="stat-label">Cookies</div>
            </div>

            <div class="stat-card">
                <div class="stat-icon orange">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 14l-4-4 4-4"/><path d="M5 10h11a4 4 0 010 8h-1"/></svg>
                </div>
                <div class="stat-value" id="statOrders">—</div>
                <div class="stat-label">Total Orders</div>
            </div>
        </div>

        <!-- ── Quick Actions ── -->
        <div class="quick-grid">
            <a href="/boost" class="quick-btn">
                <div class="quick-icon" style="background:rgba(34,197,94,.12);color:#86efac;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                </div>
                <span class="quick-label">Boost</span>
            </a>
            <a href="/cookies" class="quick-btn">
                <div class="quick-icon" style="background:rgba(59,130,246,.12);color:#93c5fd;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
                </div>
                <span class="quick-label">Cookies</span>
            </a>
            <a href="/inbox" class="quick-btn" id="qInbox">
                <div class="quick-icon" style="background:rgba(168,85,247,.12);color:#d8b4fe;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
                </div>
                <span class="quick-label">Inbox</span>
            </a>
            <a href="/profile" class="quick-btn">
                <div class="quick-icon" style="background:rgba(249,115,22,.12);color:#fdba74;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </div>
                <span class="quick-label">Profile</span>
            </a>
        </div>

        <!-- ── 2-col grid: Chart + Inbox ── -->
        <div class="grid-2">

            <!-- Share History Chart -->
            <div class="section-card">
                <div class="section-head">
                    <span class="section-title">Share Activity</span>
                    <span class="section-link" style="font-size:.7rem;color:#444;">Last 30 days</span>
                </div>
                <div class="chart-wrap">
                    <canvas id="shareChart"></canvas>
                </div>
            </div>

            <!-- Inbox Preview -->
            <div class="section-card">
                <div class="section-head">
                    <span class="section-title">Inbox</span>
                    <a href="/inbox" class="section-link">View all →</a>
                </div>
                <div id="inboxList">
                    <div class="empty-state">
                        <div class="skeleton" style="height:12px;width:60%;margin:.5rem auto;"></div>
                        <div class="skeleton" style="height:12px;width:40%;margin:.5rem auto;"></div>
                    </div>
                </div>
            </div>

        </div>

        <!-- ── Recent Orders ── -->
        <div class="section-card" style="margin-bottom:1.25rem;">
            <div class="section-head">
                <span class="section-title">Recent Orders</span>
                <a href="/transactions" class="section-link">View all →</a>
            </div>
            <div id="orderList">
                <div class="empty-state">
                    <div class="skeleton" style="height:12px;width:55%;margin:.5rem auto;"></div>
                    <div class="skeleton" style="height:12px;width:35%;margin:.5rem auto;"></div>
                </div>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer>
        © 2026 Developed by <span>Kiro Takashi</span>
    </footer>

</div><!-- /app -->

<!-- Toast -->
<div id="toast"></div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
'use strict';

/* ═══════════════════════════════════════════
   AUTH GUARD
═══════════════════════════════════════════ */
const TOKEN    = localStorage.getItem('token') || localStorage.getItem('kb_token');
const USERNAME = localStorage.getItem('username');
const ROLE     = localStorage.getItem('userRole');

if (!TOKEN) {
    window.location.href = '/login';
}

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
function authHeaders() {
    return { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' };
}

async function apiFetch(url, opts = {}) {
    const res = await fetch(url, {
        ...opts,
        headers: { ...authHeaders(), ...(opts.headers || {}) }
    });
    if (res.status === 401) { logout(); return null; }
    return res.json();
}

function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    const icon = type === 'success'
        ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`
        : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
    el.className = `show ${type}`;
    el.innerHTML = icon + msg;
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.className = ''; }, 3000);
}

function fmt(n) {
    if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
    if (n >= 1_000)     return (n / 1_000).toFixed(1) + 'k';
    return String(n);
}

function logout() {
    ['token','kb_token','userRole','username','kb_user'].forEach(k => localStorage.removeItem(k));
    window.location.href = '/login';
}

/* ═══════════════════════════════════════════
   RENDER HELPERS
═══════════════════════════════════════════ */
function statusChip(s) {
    return `<span class="chip ${s}">${s.charAt(0).toUpperCase() + s.slice(1)}</span>`;
}

function initials(name) {
    return (name || '?').substring(0,2).toUpperCase();
}

/* ═══════════════════════════════════════════
   LOAD USER STATS  →  GET /api/user/stats
═══════════════════════════════════════════ */
async function loadStats() {
    const data = await apiFetch('/api/user/stats');
    if (!data || !data.success) return;

    const s = data.stats;

    // Navbar
    document.getElementById('navAvatarInitial').textContent = initials(s.username);
    document.getElementById('dropUsername').textContent = s.username;
    document.getElementById('dropRole').textContent = ROLE === 'admin' ? 'Administrator' : 'Member';

    // Set nav avatar image if exists
    const navAv = document.getElementById('navAvatar');
    if (s.profileImage || s.profileImageUrl) {
        const src = s.profileImage || s.profileImageUrl;
        navAv.innerHTML = `<img src="${src}" alt="">`;
    }

    // Hero
    document.getElementById('heroUsername').textContent = s.username;

    const heroAv = document.getElementById('heroAvatar');
    if (s.profileImage || s.profileImageUrl) {
        const src = s.profileImage || s.profileImageUrl;
        heroAv.innerHTML = `<img src="${src}" alt="">`;
    } else {
        document.getElementById('heroAvatarInitial').textContent = initials(s.username);
    }

    // Banner
    const banner = document.getElementById('heroBanner');
    if (s.bannerImage) {
        banner.style.backgroundImage = `url(${s.bannerImage})`;
        banner.style.backgroundSize = 'cover';
        banner.style.backgroundPosition = 'center';
    } else {
        banner.style.background = s.bannerColor || '#111';
    }

    // Apply accent color to avatar border
    if (s.accentColor && s.accentColor !== '#ffffff') {
        heroAv.style.borderColor = s.accentColor;
    }

    // Bio / status
    if (s.bio) document.getElementById('heroBio').textContent = s.bio;
    if (s.status && s.status !== 'online') {
        document.getElementById('heroStatusText').textContent = s.status;
    }

    // Status dot
    const dot = document.getElementById('statusDot');
    if (!s.isActive) { dot.classList.add('offline'); }

    // Chips
    if (s.isActive) document.getElementById('activeChip').style.display = 'inline-flex';
    if (ROLE === 'admin') document.getElementById('adminChip').style.display = 'inline-flex';

    // Stat cards
    document.getElementById('statShares').textContent  = fmt(s.totalShares || 0);
    document.getElementById('statCookies').textContent = s.cookieCount || 0;

    // Share chart
    buildChart(s.shareHistory || []);
}

/* ═══════════════════════════════════════════
   LOAD ORDERS  →  GET /api/user/orders/history
═══════════════════════════════════════════ */
async function loadOrders() {
    const data = await apiFetch('/api/user/orders/history?limit=5');
    if (!data || !data.success) return;

    // Update orders stat card
    document.getElementById('statOrders').textContent = fmt(data.summary?.total || 0);

    const list = document.getElementById('orderList');

    if (!data.orders || data.orders.length === 0) {
        list.innerHTML = `
            <div class="empty-state">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 14l-4-4 4-4"/><path d="M5 10h11a4 4 0 010 8h-1"/></svg>
                <div>No orders yet</div>
            </div>`;
        return;
    }

    list.innerHTML = data.orders.map(o => `
        <div class="order-row">
            <div class="order-icon">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
            </div>
            <div class="order-main">
                <div class="order-ref">${o.referenceNote || o.orderId}</div>
                <div class="order-meta">${o.customerName || '—'} · ${o.date}</div>
            </div>
            <div class="order-right">
                <div class="order-qty">×${fmt(o.quantity)}</div>
                ${statusChip(o.status)}
            </div>
        </div>
    `).join('');
}

/* ═══════════════════════════════════════════
   LOAD INBOX  →  GET /api/user/inbox
═══════════════════════════════════════════ */
async function loadInbox() {
    const data = await apiFetch('/api/user/inbox?limit=5');
    if (!data || !data.success) return;

    // Badge
    const unread = data.unreadCount || 0;
    const badge  = document.getElementById('inboxBadge');
    if (unread > 0) {
        badge.textContent = unread > 9 ? '9+' : unread;
        badge.classList.add('show');
    }

    const list = document.getElementById('inboxList');

    if (!data.messages || data.messages.length === 0) {
        list.innerHTML = `
            <div class="empty-state">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
                <div>No messages</div>
            </div>`;
        return;
    }

    list.innerHTML = data.messages.map(m => `
        <div class="inbox-row ${m.isRead ? '' : 'unread'}" onclick="window.location.href='/inbox'">
            <div class="inbox-dot"></div>
            <div class="inbox-body">
                <div class="inbox-title">${m.title}</div>
                <div class="inbox-preview">${m.content}</div>
            </div>
            <div class="inbox-time">${m.time}</div>
        </div>
    `).join('');
}

/* ═══════════════════════════════════════════
   SHARE HISTORY CHART
═══════════════════════════════════════════ */
let chartInstance = null;

function buildChart(history) {
    const ctx = document.getElementById('shareChart');
    if (!ctx) return;

    // Fill up to 30 labels, last 30 days
    const today = new Date();
    const labels = [], values = [];

    for (let i = 29; i >= 0; i--) {
        const d = new Date(today);
        d.setDate(d.getDate() - i);
        const key = d.toISOString().split('T')[0];
        labels.push(i === 0 ? 'Today' : d.toLocaleDateString('en', { month:'short', day:'numeric' }));
        const entry = history.find(h => h.date === key);
        values.push(entry ? entry.count : 0);
    }

    if (chartInstance) chartInstance.destroy();

    chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
            labels,
            datasets: [{
                data: values,
                backgroundColor: 'rgba(255,255,255,0.1)',
                hoverBackgroundColor: 'rgba(255,255,255,0.25)',
                borderRadius: 4,
                borderSkipped: false
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false }, tooltip: {
                backgroundColor: '#111',
                borderColor: 'rgba(255,255,255,0.1)',
                borderWidth: 1,
                titleColor: '#fff',
                bodyColor: '#B4B4B4',
                padding: 8,
                callbacks: {
                    title: items => items[0].label,
                    label: item => ` ${item.raw} shares`
                }
            }},
            scales: {
                x: {
                    grid: { display: false },
                    ticks: { color: '#444', font: { size: 9, family: 'Outfit' },
                        maxTicksLimit: 7,
                        maxRotation: 0
                    },
                    border: { display: false }
                },
                y: {
                    grid: { color: 'rgba(255,255,255,0.04)', drawBorder: false },
                    ticks: { color: '#444', font: { size: 9, family: 'Outfit' }, maxTicksLimit: 4 },
                    border: { display: false },
                    beginAtZero: true
                }
            }
        }
    });
}

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
(async function init() {
    // Set initial navbar from localStorage while API loads
    if (USERNAME) {
        document.getElementById('navAvatarInitial').textContent = initials(USERNAME);
        document.getElementById('dropUsername').textContent = USERNAME;
        document.getElementById('dropRole').textContent = ROLE === 'admin' ? 'Administrator' : 'Member';
        document.getElementById('heroUsername').textContent = USERNAME;
        document.getElementById('heroAvatarInitial').textContent = initials(USERNAME);
    }

    // Load all data in parallel
    await Promise.all([
        loadStats(),
        loadOrders(),
        loadInbox()
    ]);
})();
</script>

</body>
</html>
