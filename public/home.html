    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'sans': ['Karla', 'sans-serif'],
                        'header': ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        'kiro-blue': '#007DFE',
                        'kiro-dark': '#0055aa',
                        'kiro-bg': '#F4F7F9',
                        'success': '#22C55E',
                        'warning': '#F59E0B',
                    },
                    boxShadow: {
                        'card': '0 8px 20px rgba(0,0,0,0.06)',
                        'floating': '0 10px 25px -5px rgba(0, 125, 254, 0.4)',
                        'fire': '0 0 15px rgba(255, 87, 34, 0.6), 0 0 5px rgba(255, 193, 7, 0.8)',

    <style>
        body { background-color: #F4F7F9; -webkit-tap-highlight-color: transparent; }
        
        #app-wrapper {
            max-width: 480px;
            margin: 0 auto;
            background-color: #ffffff;
            min-height: 100vh;
            position: relative;
            padding-bottom: 90px;
        }

        .curved-header {
            background: linear-gradient(180deg, #007DFE 0%, #0069d9 100%);
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
        }

        /* Animations */
        .fade-in { animation: fadeIn 0.5s cubic-bezier(0.22, 1, 0.36, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .tap-effect:active { transform: scale(0.95); transition: transform 0.1s; opacity: 0.8; }

        /* --- PREMIUM FIRE ANIMATION --- */
        .premium-fire {
            background: #fff;
            border: 1px solid #ff9800 !important;
            animation: heat-pulse 2s infinite alternate;
            position: relative;
            overflow: hidden;
        }

        /* The Heating Glow */
        @keyframes heat-pulse {
            0% { box-shadow: 0 4px 6px rgba(255, 152, 0, 0.2); }
            100% { box-shadow: 0 0 15px rgba(255, 87, 34, 0.5), 0 0 5px rgba(255, 193, 7, 0.6); border-color: #ff5722; }
        }

        /* The Shiny Shimmer Overlay */
        .premium-fire::after {
            content: "";
            position: absolute;
            top: 0;
            left: -150%;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, transparent 0%, rgba(255, 255, 255, 0.8) 50%, rgba(255, 215, 0, 0.2) 55%, transparent 100%);
            transform: skewX(-25deg);
            animation: shimmer 3s infinite;
            pointer-events: none;
        }

        @keyframes shimmer {
            0% { left: -150%; }
            30% { left: 150%; } /* Fast swipe */
            100% { left: 150%; } /* Pause */
        }

        /* Fire Text */
        .text-fire {
            background: linear-gradient(to right, #d32f2f, #f57c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>

    <script>
        const token = localStorage.getItem('kb_token');
        if (!token) window.location.href = '/login';

        let user = JSON.parse(localStorage.getItem('kb_user') || '{}');

        async function loadData() {
            try {
                // Realtime Stats
                const statsRes = await fetch('/api/user/stats', { headers: { 'Authorization': `Bearer ${token}` } });
                
                if (!statsRes.ok) {
                    if (statsRes.status === 401) {
                        localStorage.clear();
                        window.location.href = '/login';
                        return;
                    }
                }

                const statsData = await statsRes.json();
                
                if (statsData.success) {
                    const stats = statsData.stats;
                    user = { ...user, ...stats };
                    localStorage.setItem('kb_user', JSON.stringify(user));
                    
                    // HEADER
                    document.getElementById('headerName').textContent = stats.username;
                    document.getElementById('headerAvatar').textContent = stats.username.substring(0, 1).toUpperCase();
                    
                    // BALANCE
                    document.getElementById('cookieBalance').textContent = stats.cookieCount || 0;
                    document.getElementById('cookieLimit').textContent = stats.cookieLimit || 10;
                    
                    // STATUS
                    const statusEl = document.getElementById('userStatus');
                    statusEl.textContent = stats.isActive ? 'Verified' : 'Pending';
                    statusEl.className = stats.isActive ? 'text-xs font-bold text-success leading-none mt-0.5' : 'text-xs font-bold text-warning leading-none mt-0.5';

                    // PLAN & FIRE ANIMATION
                    const planEl = document.getElementById('planName');
                    const planCard = document.getElementById('planCard');
                    const planIconBg = document.getElementById('planIconBg');
                    const planIcon = document.getElementById('planIcon');

                    if (stats.plan === 'premium') {
                        planEl.textContent = 'Premium';
                        planEl.className = 'text-xs font-bold text-red-600 leading-none mt-0.5 text-fire';
                        
                        // Activate Fire Effects
                        planCard.classList.add('premium-fire');
                        planIconBg.className = 'bg-red-50 p-2 rounded-full text-red-500 transition-colors duration-300';
                        planIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 18.657A8 8 0 016.343 7.343S7 9 9 10c0-2 .5-5 2.986-7C14 5 16.09 5.777 17.656 7.343A7.975 7.975 0 0120 13a7.975 7.975 0 01-2.343 5.657z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.879 16.121A3 3 0 1012.015 11L11 14H9c0 .768.293 1.536.879 2.121z"></path>';
                    } else {
                        planEl.textContent = 'Basic';
                        planEl.className = 'text-xs font-bold text-gray-500 leading-none mt-0.5';
                    }

                    if (stats.isAdmin) {
                        document.getElementById('adminIcon').classList.remove('hidden');
                    }
                }

                // INBOX
                const inboxRes = await fetch('/api/user/inbox?filter=unread&limit=1', { headers: { 'Authorization': `Bearer ${token}` } });
                const inboxData = await inboxRes.json();
                if (inboxData.success && inboxData.unreadCount > 0) {
                    document.getElementById('gridBadge').classList.remove('hidden');
                    document.getElementById('navBadge').classList.remove('hidden');
                }

            } catch (err) {
                console.error("Data load error");
                // Attempt local cache fallback
                if(user.username) {
                    document.getElementById('headerName').textContent = user.username;
                    document.getElementById('cookieBalance').textContent = user.cookieCount || 0;
                }
            }
        }

        loadData();
    </script>
</body>
</html>
