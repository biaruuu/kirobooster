<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kiro Cookies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Karla:wght@400;500;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'sans': ['Karla', 'sans-serif'],
                        'header': ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        'kiro-blue': '#007DFE',
                        'kiro-dark': '#0055aa',
                        'kiro-bg': '#F4F7F9',
                        'success': '#22C55E',
                        'error': '#DC2626',
                        'gray-txt': '#6B7280'
                    },
                    boxShadow: {
                        'card': '0 4px 12px rgba(0,0,0,0.05)',
                        'floating': '0 10px 25px -5px rgba(0, 125, 254, 0.4)',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F4F7F9; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none; }
        
        #app-wrapper {
            max-width: 480px;
            margin: 0 auto;
            background-color: #ffffff;
            min-height: 100vh;
            position: relative;
            padding-bottom: 90px;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* Animations */
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .tap-effect:active { transform: scale(0.96); transition: transform 0.1s; opacity: 0.9; }

        /* Cookie Bubble Styling */
        .cookie-bubble .avatar-circle { transition: all 0.2s; }
        .cookie-bubble.selected .avatar-circle {
            background-color: #0055aa; 
            ring: 3px solid #BFDBFE;
        }
        .cookie-bubble.selected .check-badge { display: flex; }

        /* Scrollbar Hide */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Modal Blur */
        .modal-backdrop { backdrop-filter: blur(2px); }
    </style>
</head>
<body>

    <div id="addModal" class="hidden fixed inset-0 z-[70] flex items-center justify-center bg-black/40 modal-backdrop px-4">
        <div class="bg-white rounded-2xl w-full max-w-sm p-5 shadow-2xl fade-in transform transition-all scale-100">
            <h3 class="font-header font-bold text-lg text-gray-800 mb-2">Add New Cookie</h3>
            <p class="text-xs text-gray-500 mb-4">Paste your Facebook cookie/appstate JSON below.</p>
            
            <textarea id="cookieInput" rows="5" 
                class="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm focus:outline-none focus:ring-1 focus:ring-kiro-blue mb-4 resize-none font-mono text-gray-600"
                placeholder='[{"key": "c_user", "value": "..."}]'></textarea>
            
            <div id="modalError" class="hidden text-xs text-red-500 mb-3 font-bold bg-red-50 p-2 rounded-lg">Error message</div>

            <div class="flex gap-3">
                <button onclick="closeAddModal()" class="flex-1 py-3 bg-gray-100 text-gray-600 font-bold text-sm rounded-xl hover:bg-gray-200 transition tap-effect">Cancel</button>
                <button onclick="submitCookie()" id="submitBtn" class="flex-1 py-3 bg-kiro-blue text-white font-bold text-sm rounded-xl shadow-lg tap-effect flex justify-center items-center gap-2">
                    Add Account
                </button>
            </div>
        </div>
    </div>

    <div id="app-wrapper">
        
        <header class="bg-kiro-blue text-white h-16 flex items-center justify-between px-4 shadow-sm sticky top-0 z-40">
            <a href="/home" class="p-2 -ml-2 hover:bg-white/20 rounded-full transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
            </a>
            <h1 class="font-header font-semibold text-lg tracking-wide">Manage Accounts</h1>
            <button onclick="openAddModal()" class="p-2 -mr-2 hover:bg-white/20 rounded-full transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
            </button>
        </header>

        <main class="p-4">
            
            <div class="bg-white p-4 rounded-xl shadow-card border border-gray-100 mb-6 flex justify-between items-center fade-in">
                <div>
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider mb-0.5">Total Accounts</p>
                    <div class="flex items-baseline gap-1">
                        <span id="cookieCount" class="text-2xl font-bold text-gray-800">--</span>
                        <span class="text-sm text-gray-400 font-medium">/ <span id="cookieLimit">--</span></span>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider mb-1">Your Plan</p>
                    <span id="planBadge" class="inline-block bg-blue-50 text-kiro-blue text-[10px] font-bold px-2.5 py-1 rounded-md border border-blue-100">Free</span>
                </div>
            </div>

            <div class="flex justify-between items-center mb-4 px-1 fade-in">
                <p class="text-[11px] text-gray-500 font-medium">Tap contacts to select</p>
                <div class="flex items-center gap-2">
                    <span id="selectedCount" class="text-xs font-bold text-kiro-blue">0 selected</span>
                    <button onclick="deleteSelected()" id="deleteBtn" class="hidden text-xs font-bold text-red-500 bg-red-50 px-2 py-1 rounded hover:bg-red-100 transition">Delete</button>
                </div>
            </div>

            <div id="cookieListContainer" class="fade-in">
                <div id="cookieList" class="flex gap-4 overflow-x-auto no-scrollbar pb-4 px-1 min-h-[100px] items-start">
                    <div class="flex justify-center w-full py-4">
                        <div class="w-6 h-6 border-2 border-kiro-blue border-t-transparent rounded-full animate-spin"></div>
                    </div>
                </div>
                
                <div class="text-center mt-2 border-t border-gray-100 pt-4">
                    <button onclick="selectAllCookies()" class="text-xs text-kiro-blue font-bold active:opacity-60 transition">Select All Accounts</button>
                </div>
            </div>

        </main>

        <nav class="fixed bottom-0 w-full max-w-[480px] bg-white border-t border-gray-100 pb-5 pt-2 px-4 flex justify-between items-end z-40 text-[10px] font-medium text-gray-400">
            <a href="/home" class="flex flex-col items-center w-1/5 hover:text-kiro-blue transition group">
                <svg class="w-6 h-6 mb-1 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                <span>Home</span>
            </a>
            <a href="/inbox" class="flex flex-col items-center w-1/5 hover:text-kiro-blue transition group">
                <svg class="w-6 h-6 mb-1 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                <span>Inbox</span>
            </a>
            <a href="/boost" class="flex flex-col items-center w-1/5 -mt-6 group tap-effect">
                <div class="bg-gray-50 p-1 rounded-full group-hover:-translate-y-1 transition">
                    <div class="w-12 h-12 bg-kiro-blue rounded-full flex items-center justify-center text-white shadow-lg">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                    </div>
                </div>
                <span class="mt-1 text-kiro-blue font-bold">Boost</span>
            </a>
            <a href="/transactions" class="flex flex-col items-center w-1/5 hover:text-kiro-blue transition group">
                <svg class="w-6 h-6 mb-1 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                <span>Orders</span>
            </a>
            <a href="/profile" class="flex flex-col items-center w-1/5 hover:text-kiro-blue transition group">
                <svg class="w-6 h-6 mb-1 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                <span>Profile</span>
            </a>
        </nav>

    </div>

    <script>
        const token = localStorage.getItem('kb_token');
        if (!token) window.location.href = '/login';

        let cookies = [];

        // FETCH COOKIES
        async function loadCookies() {
            try {
                const res = await fetch('/api/user/cookies', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                
                if (data.success) {
                    cookies = data.cookies || [];
                    
                    // Update Stats
                    document.getElementById('cookieCount').textContent = data.count || cookies.length;
                    document.getElementById('cookieLimit').textContent = data.limit || 10;
                    
                    const planBadge = document.getElementById('planBadge');
                    if(data.plan === 'premium') {
                        planBadge.textContent = "Premium";
                        planBadge.className = "inline-block bg-amber-100 text-amber-600 text-[10px] font-bold px-2.5 py-1 rounded-md border border-amber-200";
                    }

                    renderList();
                } else {
                    document.getElementById('cookieList').innerHTML = '<p class="text-xs text-error font-medium w-full text-center">Failed to load data</p>';
                }
            } catch (err) {
                document.getElementById('cookieList').innerHTML = '<p class="text-xs text-error font-medium w-full text-center">Connection Error</p>';
            }
        }

        // RENDER CONTACT BUBBLES
        function renderList() {
            const container = document.getElementById('cookieList');
            
            if (cookies.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center w-full py-6 opacity-60">
                        <div class="w-12 h-12 bg-gray-100 rounded-full flex items-center justify-center mb-2">
                            <svg class="w-6 h-6 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                        </div>
                        <p class="text-xs text-gray-400 font-medium">Tap + to link account</p>
                    </div>`;
                return;
            }

            container.innerHTML = cookies.map((c, i) => `
                <div onclick="toggleCookie(${i})" class="cookie-bubble flex flex-col items-center flex-shrink-0 cursor-pointer group w-[74px] relative transition-transform active:scale-95" id="cookie-${i}">
                    <div class="avatar-circle w-[52px] h-[52px] bg-gray-100 text-kiro-blue rounded-full flex items-center justify-center font-bold text-lg mb-1.5 shadow-sm border border-gray-200 relative overflow-hidden">
                        ${c.name.charAt(0).toUpperCase()}
                        
                        <div class="check-badge hidden absolute inset-0 bg-kiro-blue/80 items-center justify-center text-white backdrop-blur-[1px]">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
                        </div>

                        ${c.status === 'active' ? `<div class="active-dot absolute bottom-1 right-1 w-2.5 h-2.5 bg-green-500 rounded-full border-2 border-white"></div>` : ''}
                    </div>
                    
                    <p class="text-[10px] text-center font-bold text-gray-700 leading-tight w-full truncate px-1">${c.name.split(' ')[0]}</p>
                    <p class="text-[8px] text-center text-gray-400 font-medium">${c.uid}</p>
                    
                    <input type="checkbox" class="cookie-cb hidden" data-index="${i}" data-id="${c.id}">
                </div>
            `).join('');
        }

        // --- SELECTION LOGIC ---
        function toggleCookie(index) {
            const card = document.getElementById(`cookie-${index}`);
            const cb = card.querySelector('.cookie-cb');
            
            cb.checked = !cb.checked;
            
            // Toggle visual state
            if(cb.checked) {
                card.classList.add('selected');
                // Hide active dot when selected to show checkmark cleanly
                const dot = card.querySelector('.active-dot');
                if(dot) dot.classList.add('hidden');
            } else {
                card.classList.remove('selected');
                const dot = card.querySelector('.active-dot');
                if(dot) dot.classList.remove('hidden');
            }
            updateSelectionUI();
        }

        function selectAllCookies() {
            const cbs = document.querySelectorAll('.cookie-cb');
            const allChecked = Array.from(cbs).every(cb => cb.checked);
            
            cbs.forEach(cb => {
                cb.checked = !allChecked;
                const card = cb.closest('.cookie-bubble');
                const dot = card.querySelector('.active-dot');
                
                if(!allChecked) {
                    card.classList.add('selected');
                    if(dot) dot.classList.add('hidden');
                } else {
                    card.classList.remove('selected');
                    if(dot) dot.classList.remove('hidden');
                }
            });
            updateSelectionUI();
        }

        function updateSelectionUI() {
            const count = document.querySelectorAll('.cookie-cb:checked').length;
            document.getElementById('selectedCount').textContent = `${count} selected`;
            
            // Show delete button if selection > 0
            const delBtn = document.getElementById('deleteBtn');
            if(count > 0) {
                delBtn.classList.remove('hidden');
            } else {
                delBtn.classList.add('hidden');
            }
        }

        function getSelectedIds() {
            return Array.from(document.querySelectorAll('.cookie-cb:checked')).map(cb => cb.dataset.id);
        }

        // --- ADD COOKIE ---
        function openAddModal() {
            document.getElementById('addModal').classList.remove('hidden');
            document.getElementById('cookieInput').value = '';
            document.getElementById('modalError').classList.add('hidden');
        }

        function closeAddModal() {
            document.getElementById('addModal').classList.add('hidden');
        }

        async function submitCookie() {
            const cookie = document.getElementById('cookieInput').value.trim();
            const btn = document.getElementById('submitBtn');
            const errorText = document.getElementById('modalError');

            if (!cookie) return;

            btn.disabled = true;
            btn.innerHTML = '<div class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div>';
            errorText.classList.add('hidden');

            try {
                const res = await fetch('/api/user/cookies', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ cookie })
                });
                const data = await res.json();

                if (data.success) {
                    closeAddModal();
                    loadCookies(); // Refresh UI
                } else {
                    throw new Error(data.message || 'Invalid format');
                }
            } catch (err) {
                errorText.textContent = err.message;
                errorText.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Add Account';
            }
        }

        // --- DELETE LOGIC ---
        async function deleteSelected() {
            const ids = getSelectedIds();
            if(ids.length === 0) return;

            if(!confirm(`Delete ${ids.length} selected accounts?`)) return;

            try {
                await fetch('/api/user/cookies/delete-multiple', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ cookieIds: ids })
                });
                loadCookies();
                document.getElementById('deleteBtn').classList.add('hidden');
            } catch (err) {
                alert('Failed to delete');
            }
        }

        // Init
        loadCookies();
    </script>
</body>
</html>
