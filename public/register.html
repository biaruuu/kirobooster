<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KiroBoost — Create Account</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Geist Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* ───── Design Tokens — identical to login.html ──────── */
        :root {
            --bg:            #000000;
            --surface:       #0a0a0a;
            --surface-2:     #111111;
            --border:        #1f1f1f;
            --border-strong: #2e2e2e;
            --text:          #ededed;
            --text-muted:    #888888;
            --text-faint:    #484848;
            --accent:        #ffffff;
            --accent-dim:    #ededed;
            --danger:        #ff4040;
            --danger-bg:     #150000;
            --danger-border: #3a0000;
            --info-bg:       #080d08;
            --info-border:   #182018;
            --r-sm: 6px;
            --r-md: 10px;
            --r-lg: 14px;
            --font: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --ease: 0.15s ease;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: var(--font);
            background-color: var(--bg);
            color: var(--text);
            min-height: 100svh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            margin: 0;
            padding: 0;
        }

        ::selection { background: #fff; color: #000; }

        /* Subtle grid — same as login */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }

        /* ───── Header — same as login.html ─────────────────── */
        .kb-nav {
            position: sticky;
            top: 0;
            z-index: 200;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
        }
        .kb-nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .kb-brand {
            display: flex;
            align-items: center;
            gap: 9px;
            text-decoration: none;
            color: var(--text);
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.025em;
        }
        .kb-brand:hover { color: var(--text); opacity: 0.75; }
        .kb-brand-mark {
            width: 27px;
            height: 27px;
            background: #fff;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .kb-nav-end {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .kb-nav-link {
            font-size: 13px;
            color: var(--text-muted);
            text-decoration: none;
            padding: 6px 10px;
            border-radius: var(--r-sm);
            transition: color var(--ease), background var(--ease);
            font-weight: 500;
        }
        .kb-nav-link:hover { color: var(--text); background: var(--surface-2); }
        .kb-nav-cta {
            font-size: 13px;
            font-family: var(--font);
            font-weight: 500;
            color: #000;
            background: #fff;
            border: none;
            padding: 6px 14px;
            border-radius: var(--r-sm);
            cursor: pointer;
            text-decoration: none;
            transition: background var(--ease);
        }
        .kb-nav-cta:hover { background: var(--accent-dim); color: #000; }

        /* ───── Main ─────────────────────────────────────────── */
        .kb-main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px 20px 64px;
            position: relative;
            z-index: 1;
        }

        /* ───── Card — same as login.html ────────────────────── */
        .kb-card {
            width: 100%;
            max-width: 420px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            overflow: hidden;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 8px 40px rgba(0,0,0,0.6);
            animation: cardUp 0.28s cubic-bezier(0.16,1,0.3,1) both;
        }
        @keyframes cardUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .kb-card-top {
            padding: 26px 26px 20px;
            border-bottom: 1px solid var(--border);
        }
        .kb-eyebrow {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            color: var(--text-faint);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 7px;
        }
        .kb-eyebrow::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--text-faint);
            flex-shrink: 0;
        }
        .kb-title {
            font-size: 19px;
            font-weight: 600;
            letter-spacing: -0.03em;
            color: var(--text);
            margin-bottom: 3px;
        }
        .kb-sub {
            font-size: 13px;
            color: var(--text-muted);
        }
        .kb-card-body {
            padding: 22px 26px 24px;
        }
        .kb-card-foot {
            padding: 14px 26px;
            border-top: 1px solid var(--border);
            text-align: center;
        }
        .kb-card-foot p { font-size: 13px; color: var(--text-muted); margin: 0; }
        .kb-card-foot a { color: var(--text); font-weight: 500; text-decoration: none; }
        .kb-card-foot a:hover { opacity: 0.7; }

        /* ───── Fields ───────────────────────────────────────── */
        .kb-field { margin-bottom: 12px; }
        .kb-field-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
        }
        .kb-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 0.01em;
        }
        .kb-hint {
            font-size: 11px;
            color: var(--text-faint);
        }
        .kb-input-wrap { position: relative; }
        .kb-input {
            width: 100%;
            height: 36px;
            padding: 0 34px 0 11px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            font-family: var(--font);
            font-size: 14px;
            color: var(--text);
            outline: none;
            transition: border-color var(--ease), box-shadow var(--ease), background var(--ease);
            -webkit-appearance: none;
            appearance: none;
        }
        .kb-input::placeholder { color: var(--text-faint); font-size: 13px; }
        .kb-input:focus {
            border-color: rgba(255,255,255,0.4);
            box-shadow: 0 0 0 3px rgba(255,255,255,0.06);
            background: #0d0d0d;
        }

        /* Select styling */
        .kb-select { cursor: pointer; }
        .kb-select option { background: #111; color: var(--text); }

        /* Icon button (clickable — eye toggle) */
        .kb-icon-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            padding: 4px;
            border-radius: 4px;
            color: var(--text-faint);
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: color var(--ease);
            line-height: 0;
        }
        .kb-icon-btn:hover { color: var(--text-muted); }

        /* Static icon (non-clickable) */
        .kb-icon-static {
            position: absolute;
            right: 9px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-faint);
            pointer-events: none;
            line-height: 0;
        }

        /* ───── Password strength ─────────────────────────────── */
        .kb-strength-bars {
            display: flex;
            gap: 4px;
            margin-top: 7px;
        }
        .kb-bar {
            flex: 1;
            height: 2px;
            border-radius: 99px;
            background: var(--border-strong);
            transition: background 0.22s ease;
        }
        .kb-bar.s-weak   { background: #ef4444; }
        .kb-bar.s-fair   { background: #f59e0b; }
        .kb-bar.s-good   { background: #22c55e; }
        .kb-bar.s-strong { background: #22c55e; }

        .kb-strength-text {
            font-size: 11px;
            color: var(--text-faint);
            margin-top: 4px;
            min-height: 15px;
            transition: color 0.2s;
        }
        .kb-strength-text.s-weak   { color: #ef4444; }
        .kb-strength-text.s-fair   { color: #f59e0b; }
        .kb-strength-text.s-good   { color: #22c55e; }
        .kb-strength-text.s-strong { color: #22c55e; }

        /* ───── Alert ────────────────────────────────────────── */
        .kb-alert {
            display: none;
            align-items: flex-start;
            gap: 8px;
            padding: 10px 11px;
            border-radius: var(--r-sm);
            border: 1px solid var(--danger-border);
            background: var(--danger-bg);
            margin-bottom: 12px;
            animation: fadeIn 0.18s ease;
        }
        .kb-alert.show { display: flex; }
        .kb-alert svg  { flex-shrink: 0; color: var(--danger); margin-top: 1px; }
        .kb-alert-msg  { font-size: 12px; color: #ff7070; line-height: 1.5; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-3px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ───── Info note ─────────────────────────────────────── */
        .kb-note {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 10px 11px;
            border-radius: var(--r-sm);
            border: 1px solid var(--info-border);
            background: var(--info-bg);
            margin-bottom: 14px;
        }
        .kb-note svg    { flex-shrink: 0; color: var(--text-faint); margin-top: 1px; }
        .kb-note-text   { font-size: 12px; color: var(--text-muted); line-height: 1.55; }
        .kb-note-text strong { color: var(--text); font-weight: 500; }

        /* ───── Divider ──────────────────────────────────────── */
        .kb-divider {
            height: 1px;
            background: var(--border);
            margin: 14px 0;
        }

        /* ───── Button — same as login.html ──────────────────── */
        .kb-btn {
            width: 100%;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            font-family: var(--font);
            font-size: 13.5px;
            font-weight: 500;
            letter-spacing: -0.01em;
            border: none;
            border-radius: var(--r-sm);
            cursor: pointer;
            transition: background var(--ease), opacity var(--ease), transform 0.1s;
            margin-top: 2px;
        }
        .kb-btn-white { background: #fff; color: #000; }
        .kb-btn-white:hover:not(:disabled) { background: #ebebeb; }
        .kb-btn-white:active:not(:disabled) { transform: scale(0.988); }
        .kb-btn-white:disabled { opacity: 0.45; cursor: not-allowed; pointer-events: none; }

        /* ───── Spinner — same as login.html ─────────────────── */
        .kb-spin {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(0,0,0,0.15);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ───── Page Footer — same as login.html ─────────────── */
        .kb-footer {
            border-top: 1px solid var(--border);
            padding: 14px 24px;
            position: relative;
            z-index: 1;
        }
        .kb-footer-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        .kb-footer-copy { font-size: 12px; color: var(--text-faint); }
        .kb-footer-links { display: flex; align-items: center; gap: 14px; }
        .kb-footer-links a {
            font-size: 12px;
            color: var(--text-faint);
            text-decoration: none;
            transition: color var(--ease);
        }
        .kb-footer-links a:hover { color: var(--text-muted); }

        /* ───── Responsive ───────────────────────────────────── */
        @media (max-width: 480px) {
            .kb-main     { padding: 32px 16px 48px; align-items: flex-start; }
            .kb-card     { border-radius: var(--r-md); }
            .kb-card-top { padding: 20px 20px 16px; }
            .kb-card-body{ padding: 18px 20px 20px; }
            .kb-card-foot{ padding: 12px 20px; }
            .kb-nav-inner{ padding: 0 16px; }
            .kb-footer   { padding: 12px 16px; }
            .kb-footer-links { gap: 10px; }
        }
        @media (max-width: 360px) {
            .kb-title    { font-size: 17px; }
            .kb-card-top { padding: 16px 16px 14px; }
            .kb-card-body{ padding: 14px 16px 16px; }
            .kb-card-foot{ padding: 10px 16px; }
        }
        @media (min-width: 768px) and (max-width: 1024px) {
            .kb-main { padding: 64px 24px; }
        }
    </style>
</head>
<body>

    <!-- ───── Navigation ─────────────────────────────────────── -->
    <nav class="kb-nav">
        <div class="kb-nav-inner">
            <a href="/" class="kb-brand">
                <div class="kb-brand-mark">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                    </svg>
                </div>
                KiroBoost
            </a>
            <div class="kb-nav-end">
                <a href="/login" class="kb-nav-link">Log in</a>
                <a href="/login" class="kb-nav-cta">Sign in</a>
            </div>
        </div>
    </nav>

    <!-- ───── Main ────────────────────────────────────────────── -->
    <main class="kb-main">
        <div class="kb-card">

            <!-- Top -->
            <div class="kb-card-top">
                <div class="kb-eyebrow">KiroBoost</div>
                <h1 class="kb-title">Create your account</h1>
                <p class="kb-sub">Join the KiroBoost SMM panel — it's free.</p>
            </div>

            <!-- Body -->
            <div class="kb-card-body">

                <!-- Error alert -->
                <div class="kb-alert" id="errorBox" role="alert" aria-live="polite">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                    <span class="kb-alert-msg" id="errorText"></span>
                </div>

                <!-- Username -->
                <div class="kb-field">
                    <div class="kb-field-header">
                        <label class="kb-label" for="username">Username</label>
                        <span class="kb-hint">min. 3 characters</span>
                    </div>
                    <div class="kb-input-wrap">
                        <input
                            class="kb-input"
                            type="text"
                            id="username"
                            placeholder="Choose a username"
                            autocomplete="username"
                            spellcheck="false"
                            autofocus
                        >
                        <span class="kb-icon-static">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                        </span>
                    </div>
                </div>

                <!-- Password -->
                <div class="kb-field">
                    <div class="kb-field-header">
                        <label class="kb-label" for="password">Password</label>
                        <span class="kb-hint">min. 6 characters</span>
                    </div>
                    <div class="kb-input-wrap">
                        <input
                            class="kb-input"
                            type="password"
                            id="password"
                            placeholder="Create a password"
                            autocomplete="new-password"
                            oninput="checkStrength(this.value)"
                        >
                        <button class="kb-icon-btn" id="eyeBtn" type="button" aria-label="Toggle password" onclick="togglePassword()">
                            <svg id="eyeIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                    <!-- Strength meter -->
                    <div class="kb-strength-bars">
                        <div class="kb-bar" id="bar1"></div>
                        <div class="kb-bar" id="bar2"></div>
                        <div class="kb-bar" id="bar3"></div>
                        <div class="kb-bar" id="bar4"></div>
                    </div>
                    <div class="kb-strength-text" id="strengthLabel"></div>
                </div>

                <!-- Facebook Link -->
                <div class="kb-field">
                    <div class="kb-field-header">
                        <label class="kb-label" for="facebook">Facebook Profile Link</label>
                    </div>
                    <div class="kb-input-wrap">
                        <input
                            class="kb-input"
                            type="text"
                            id="facebook"
                            placeholder="facebook.com/yourprofile"
                            autocomplete="off"
                            spellcheck="false"
                        >
                        <span class="kb-icon-static">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                                <polyline points="15 3 21 3 21 9"/>
                                <line x1="10" y1="14" x2="21" y2="3"/>
                            </svg>
                        </span>
                    </div>
                </div>

                <!-- Country -->
                <div class="kb-field">
                    <div class="kb-field-header">
                        <label class="kb-label" for="country">Country</label>
                        <span class="kb-hint" id="detectStatus"></span>
                    </div>
                    <div class="kb-input-wrap">
                        <select class="kb-input kb-select" id="country">
                            <option value="" disabled selected>Select your country</option>
                            <option value="Philippines">Philippines</option>
                            <option value="Indonesia">Indonesia</option>
                            <option value="Vietnam">Vietnam</option>
                            <option value="Thailand">Thailand</option>
                            <option value="Malaysia">Malaysia</option>
                            <option value="India">India</option>
                            <option value="Bangladesh">Bangladesh</option>
                            <option value="Pakistan">Pakistan</option>
                            <option value="Other">Other</option>
                        </select>
                        <span class="kb-icon-static">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="6 9 12 15 18 9"/>
                            </svg>
                        </span>
                    </div>
                </div>

                <div class="kb-divider"></div>

                <!-- Info note -->
                <div class="kb-note">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                    <span class="kb-note-text">
                        Your account is <strong>automatically activated</strong> on registration — no waiting, no approval needed.
                    </span>
                </div>

                <!-- Submit -->
                <button class="kb-btn kb-btn-white" id="registerBtn" type="button" onclick="register()">
                    <span id="btnContent">Create account</span>
                </button>

            </div>

            <!-- Foot -->
            <div class="kb-card-foot">
                <p>Already have an account? <a href="/login">Log in</a></p>
            </div>

        </div>
    </main>

    <!-- ───── Page Footer ─────────────────────────────────────── -->
    <footer class="kb-footer">
        <div class="kb-footer-inner">
            <span class="kb-footer-copy">© 2025 KiroBoost</span>
            <div class="kb-footer-links">
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Support</a>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ── Auth guard ──────────────────────────────────────────
        if (localStorage.getItem('kb_token')) {
            window.location.replace('/home');
        }

        // ── Country auto-detect via /detect-country (main.js) ──
        (async () => {
            const label = document.getElementById('detectStatus');
            try {
                const res  = await fetch('/detect-country');
                const data = await res.json();
                if (data.success && data.country) {
                    const sel = document.getElementById('country');
                    for (const opt of sel.options) {
                        if (opt.value === data.country) {
                            opt.selected = true;
                            label.textContent = `Detected: ${data.country}`;
                            return;
                        }
                    }
                }
                label.textContent = '';
            } catch {
                label.textContent = '';
            }
        })();

        // ── Password toggle ─────────────────────────────────────
        const EYE_OPEN = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
        const EYE_OFF  = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`;

        function togglePassword() {
            const inp  = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            const show = inp.type === 'password';
            inp.type       = show ? 'text' : 'password';
            icon.innerHTML = show ? EYE_OFF : EYE_OPEN;
        }

        // ── Password strength meter ─────────────────────────────
        const LEVELS = ['s-weak', 's-fair', 's-good', 's-strong'];
        const NAMES  = ['Weak', 'Fair', 'Good', 'Strong'];

        function checkStrength(val) {
            let score = 0;
            if (val.length >= 6)  score++;
            if (val.length >= 10) score++;
            if (/[A-Z]/.test(val) && /[a-z]/.test(val)) score++;
            if (/[0-9]/.test(val) || /[^A-Za-z0-9]/.test(val)) score++;

            const lvl   = val.length === 0 ? -1 : Math.max(0, score - 1);
            const label = document.getElementById('strengthLabel');

            for (let i = 1; i <= 4; i++) {
                const bar = document.getElementById('bar' + i);
                bar.className = 'kb-bar' + (val.length > 0 && i - 1 <= lvl ? ' ' + LEVELS[lvl] : '');
            }

            label.textContent = val.length > 0 ? NAMES[lvl] : '';
            label.className   = 'kb-strength-text' + (val.length > 0 ? ' ' + LEVELS[lvl] : '');
        }

        // ── Error helpers ───────────────────────────────────────
        function showError(msg) {
            document.getElementById('errorText').textContent = msg;
            document.getElementById('errorBox').classList.add('show');
        }
        function hideError() {
            document.getElementById('errorBox').classList.remove('show');
        }

        // ── Button helpers ──────────────────────────────────────
        const btn     = document.getElementById('registerBtn');
        const btnBody = document.getElementById('btnContent');

        function setLoading(on) {
            btn.disabled = on;
            btnBody.innerHTML = on
                ? `<span class="kb-spin"></span><span>Creating account…</span>`
                : `Create account`;
        }

        function setSuccess() {
            btnBody.innerHTML = `
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
                <span>Account created!</span>`;
        }

        // ── Facebook URL normaliser — mirrors server.js logic ───
        function normaliseFacebook(raw) {
            raw = raw.trim();
            raw = raw.replace(/^https?:\/\//i, '');
            raw = raw.replace(/^(www\.|m\.)/i, '');
            if (!raw.startsWith('facebook.com') && !raw.startsWith('fb.com')) {
                if (!raw.includes('/')) raw = 'facebook.com/' + raw;
            }
            raw = raw.replace(/^fb\.com/i, 'facebook.com');
            return raw;
        }

        // ── Register ────────────────────────────────────────────
        async function register() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const rawFb    = document.getElementById('facebook').value.trim();
            const facebook = normaliseFacebook(rawFb);

            hideError();

            // Validation
            if (!username)           { showError('Please enter a username.'); return; }
            if (username.length < 3) { showError('Username must be at least 3 characters.'); return; }
            if (!password)           { showError('Please enter a password.'); return; }
            if (password.length < 6) { showError('Password must be at least 6 characters.'); return; }
            if (!rawFb)              { showError('Please enter your Facebook profile link.'); return; }

            setLoading(true);

            try {
                // POST to /api/auth/register — proxied by main.js to server.js
                const res = await fetch('/api/auth/register', {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({ username, password, facebook })
                });

                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('kb_token', data.token);
                    if (data.user) localStorage.setItem('kb_user', JSON.stringify(data.user));

                    setSuccess();
                    setTimeout(() => window.location.replace('/home'), 600);
                } else {
                    throw new Error(data.message || 'Registration failed. Please try again.');
                }

            } catch (err) {
                showError(err.message || 'Connection error. Please try again.');
                setLoading(false);
            }
        }

        // ── Enter key to submit ─────────────────────────────────
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !btn.disabled) register();
        });
    </script>
</body>
</html>
