<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kiro Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Karla:wght@400;500;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'sans': ['Karla', 'sans-serif'],
                        'header': ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        'kiro-blue': '#007DFE',
                        'kiro-dark': '#0055aa',
                        'kiro-bg': '#F4F7F9',
                        'gray-input': '#F3F4F6',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #007DFE; -webkit-tap-highlight-color: transparent; }
        
        #app-wrapper {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #007DFE;
        }

        /* Content Card */
        .content-area {
            background-color: white;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            flex: 1;
            padding: 30px 28px;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.05);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* --- FLOATING LABEL INPUTS --- */
        .input-container {
            position: relative;
            margin-bottom: 20px;
        }

        .custom-input {
            width: 100%;
            height: 56px;
            padding: 20px 16px 6px 16px;
            font-family: 'Karla', sans-serif;
            font-size: 16px;
            color: #1F2937;
            background-color: #fff;
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            outline: none;
            transition: all 0.2s ease;
            appearance: none; /* Removes default select arrow */
        }

        .custom-input:focus {
            border-color: #007DFE;
            box-shadow: 0 0 0 1px #007DFE;
        }

        /* Label Animation */
        .custom-label {
            position: absolute;
            left: 16px;
            top: 18px;
            font-size: 15px;
            color: #9CA3AF;
            pointer-events: none;
            transition: all 0.2s ease-out;
        }

        /* Float up logic */
        .custom-input:focus ~ .custom-label,
        .custom-input:not(:placeholder-shown) ~ .custom-label {
            top: 8px;
            font-size: 11px;
            color: #007DFE;
            font-weight: 700;
        }

        /* Special handling for Select element label (always float) */
        .custom-select-label {
            position: absolute;
            left: 16px;
            top: 8px;
            font-size: 11px;
            color: #007DFE;
            font-weight: 700;
            pointer-events: none;
        }

        /* Right Icon */
        .input-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #9CA3AF;
            pointer-events: none;
        }
        .clickable-icon { pointer-events: auto; cursor: pointer; }
        .custom-input:focus ~ .input-icon { color: #007DFE; }

        /* Animations */
        @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .tap-effect:active { transform: scale(0.97); transition: transform 0.1s; }
        
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border-left-color: white;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="app-wrapper">
        
        <div class="h-32 flex flex-col items-center justify-center text-white relative shrink-0">
            <div class="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full blur-3xl -mr-10 -mt-10 pointer-events-none"></div>
            <div class="absolute bottom-0 left-0 w-24 h-24 bg-white/10 rounded-full blur-2xl -ml-5 pointer-events-none"></div>

            <h1 class="font-header font-bold text-2xl tracking-wide animate-[fadeIn_0.8s]">Create Account</h1>
            <p class="text-white/80 text-sm mt-1 animate-[fadeIn_1s]">Join Kiroboost SMM Panel</p>
        </div>

        <div class="content-area">
            
            <form id="registerForm">
                
                <div class="input-container">
                    <input type="text" id="username" class="custom-input" placeholder=" " required>
                    <label class="custom-label">Username</label>
                    <div class="input-icon">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                    </div>
                </div>

                <div class="input-container">
                    <input type="password" id="password" class="custom-input" placeholder=" " required>
                    <label class="custom-label">Password</label>
                    <div class="input-icon clickable-icon" onclick="togglePassword()">
                        <svg id="eyeIcon" class="w-5 h-5 hover:text-kiro-blue transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                    </div>
                </div>

                <div class="input-container">
                    <input type="text" id="facebook" class="custom-input" placeholder=" " required>
                    <label class="custom-label">Facebook Link (Profile/Page)</label>
                    <div class="input-icon">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                    </div>
                </div>

                <div class="input-container">
                    <select id="country" class="custom-input bg-transparent" required>
                        <option value="" disabled selected>Select your country</option>
                        <option value="Philippines">Philippines</option>
                        <option value="Indonesia">Indonesia</option>
                        <option value="Vietnam">Vietnam</option>
                        <option value="Thailand">Thailand</option>
                        <option value="Malaysia">Malaysia</option>
                        <option value="India">India</option>
                        <option value="Bangladesh">Bangladesh</option>
                        <option value="Pakistan">Pakistan</option>
                        <option value="Other">Other</option>
                    </select>
                    <label class="custom-select-label">Country</label>
                    <div class="input-icon">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                    </div>
                </div>

                <div class="bg-blue-50 border border-blue-100 rounded-xl p-3 mb-6 flex gap-3 items-start">
                    <svg class="w-5 h-5 text-kiro-blue flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    <p class="text-xs text-gray-600 leading-relaxed font-sans">
                        <span class="font-bold text-gray-800">Note:</span> Accounts are initially <span class="text-red-500 font-bold">INACTIVE</span>. Please contact the admin after registering to activate your account.
                    </p>
                </div>

                <div id="errorBox" class="hidden bg-red-50 border border-red-100 rounded-xl p-3 mb-4 text-xs text-red-600 font-bold flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    <span id="errorText">Error message</span>
                </div>

                <button type="submit" id="registerBtn" class="w-full bg-kiro-blue text-white font-bold py-4 rounded-full text-base shadow-lg shadow-blue-200 tap-effect flex justify-center items-center gap-2 mb-6 transition-all hover:shadow-xl active:scale-[0.98]">
                    <span>Register Account</span>
                </button>

            </form>

            <div class="text-center pb-4">
                <p class="text-sm text-gray-500 font-medium">Already have an account? <a href="/login" class="text-kiro-blue font-bold ml-1 hover:underline tap-effect">Log In</a></p>
            </div>

        </div>
    </div>

    <script>
        // --- 1. IP Based Country Detection ---
        fetch('http://ip-api.com/json/')
            .then(res => res.json())
            .then(data => {
                if (data.country) {
                    const select = document.getElementById('country');
                    // Check if country exists in options
                    for (let option of select.options) {
                        if (option.value === data.country) {
                            option.selected = true;
                            // Add 'placeholder-shown' logic if needed, but select is handled differently
                            break;
                        }
                    }
                }
            })
            .catch(() => console.log("Auto-detect failed, user must select manual"));

        // --- 2. Password Toggle ---
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.add('text-kiro-blue');
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />';
            } else {
                input.type = 'password';
                icon.classList.remove('text-kiro-blue');
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
            }
        }

        // --- 3. Form Submission ---
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('registerBtn');
            const errorBox = document.getElementById('errorBox');
            const errorText = document.getElementById('errorText');
            
            // Loading State
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div>';
            errorBox.classList.add('hidden');

            // Data Prep
            let facebook = document.getElementById('facebook').value.trim();
            // Smart FB Logic: Remove https/www, ensure facebook.com prefix
            facebook = facebook.replace(/^https?:\/\//, '').replace(/^(www\.|m\.)/, '');
            if (!facebook.startsWith('facebook.com')) {
                facebook = 'facebook.com/' + facebook;
            }

            const data = {
                username: document.getElementById('username').value.trim(),
                password: document.getElementById('password').value,
                facebook: facebook,
                country: document.getElementById('country').value
            };

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await res.json();

                if (result.success) {
                    localStorage.setItem('kb_token', result.token);
                    if(result.user) localStorage.setItem('kb_user', JSON.stringify(result.user));
                    window.location.href = '/home';
                } else {
                    throw new Error(result.message || 'Registration failed');
                }
            } catch (err) {
                errorText.textContent = err.message || "Connection Error";
                errorBox.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>Register Account</span>';
            }
        });
    </script>
</body>
</html>
