<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KiroBoost — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg:             #ffffff;
            --bg-muted:       #fafafa;
            --border:         #e4e4e7;
            --border-input:   #d4d4d8;
            --border-hover:   #a1a1aa;
            --border-focus:   #18181b;
            --text:           #18181b;
            --text-muted:     #71717a;
            --text-subtle:    #a1a1aa;
            --accent:         #18181b;
            --accent-fg:      #ffffff;
            --error:          #ef4444;
            --error-bg:       #fef2f2;
            --error-border:   #fecaca;
            --error-text:     #b91c1c;
            --radius:         8px;
            --radius-sm:      6px;
            --radius-lg:      12px;
        }

        html, body {
            height: 100%;
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-muted);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ── Page Layout ─────────────────────────────────── */

        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        /* ── Card ─────────────────────────────────────────── */

        .card {
            width: 100%;
            max-width: 388px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 28px 28px 28px;
            animation: cardIn .3s cubic-bezier(.16,1,.3,1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(10px) scale(.99); }
            to   { opacity: 1; transform: none; }
        }

        /* ── Brand ────────────────────────────────────────── */

        .brand {
            display: flex;
            align-items: center;
            gap: 9px;
            margin-bottom: 24px;
        }

        .brand-mark {
            width: 30px;
            height: 30px;
            background: var(--accent);
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .brand-mark svg {
            width: 15px;
            height: 15px;
            fill: var(--accent-fg);
        }

        .brand-name {
            font-size: 14.5px;
            font-weight: 600;
            letter-spacing: -0.015em;
            color: var(--text);
        }

        /* ── Header ───────────────────────────────────────── */

        .card-head {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.03em;
            color: var(--text);
            line-height: 1.3;
        }

        .card-sub {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 3px;
            line-height: 1.5;
        }

        /* ── Form ─────────────────────────────────────────── */

        .form-fields {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 14px;
        }

        /* ── Floating Label Field (MUI style) ─────────────── */

        .field {
            position: relative;
        }

        .field-input {
            width: 100%;
            height: 50px;
            padding: 18px 14px 7px 13px;
            font-family: 'Geist', sans-serif;
            font-size: 14px;
            font-weight: 400;
            color: var(--text);
            background: var(--bg);
            border: 1px solid var(--border-input);
            border-radius: var(--radius);
            outline: none;
            transition: border-color .15s ease, box-shadow .15s ease;
            caret-color: var(--accent);
            line-height: 1;
        }

        .field-input::placeholder { color: transparent; }

        .field-input:hover {
            border-color: var(--border-hover);
        }

        .field-input:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(24,24,27,.08);
        }

        .field-input.has-icon {
            padding-right: 42px;
        }

        .field-label {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            font-family: 'Geist', sans-serif;
            font-size: 13.5px;
            font-weight: 400;
            color: var(--text-subtle);
            pointer-events: none;
            transition: all .15s cubic-bezier(.4,0,.2,1);
            background: transparent;
            line-height: 1;
            white-space: nowrap;
        }

        /* Float up on focus or when filled */
        .field-input:focus        + .field-label,
        .field-input:not(:placeholder-shown) + .field-label {
            top: 9px;
            transform: none;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .field-input:focus + .field-label {
            color: var(--accent);
        }

        /* Eye toggle */
        .eye-btn {
            position: absolute;
            right: 11px;
            top: 50%;
            transform: translateY(-50%);
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-subtle);
            border-radius: var(--radius-sm);
            transition: color .15s, background .15s;
        }

        .eye-btn:hover {
            color: var(--text-muted);
            background: var(--bg-muted);
        }

        .eye-btn svg {
            width: 15px;
            height: 15px;
            flex-shrink: 0;
        }

        /* ── Forgot row ───────────────────────────────────── */

        .row-forgot {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 18px;
        }

        .link-forgot {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            text-decoration: none;
            transition: color .15s;
        }

        .link-forgot:hover { color: var(--text); }

        /* ── Error ────────────────────────────────────────── */

        .error-box {
            display: none;
            align-items: flex-start;
            gap: 8px;
            background: var(--error-bg);
            border: 1px solid var(--error-border);
            border-radius: var(--radius-sm);
            padding: 9px 11px;
            margin-bottom: 14px;
        }

        .error-box.show {
            display: flex;
            animation: fadeSlide .2s ease both;
        }

        .error-box svg {
            width: 14px;
            height: 14px;
            color: var(--error);
            flex-shrink: 0;
            margin-top: 1px;
        }

        .error-box p {
            font-size: 12.5px;
            font-weight: 500;
            color: var(--error-text);
            line-height: 1.45;
        }

        /* ── Primary button ───────────────────────────────── */

        .btn {
            width: 100%;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            background: var(--accent);
            color: var(--accent-fg);
            font-family: 'Geist', sans-serif;
            font-size: 13.5px;
            font-weight: 500;
            letter-spacing: -0.01em;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            transition: opacity .15s, transform .1s;
            margin-bottom: 18px;
        }

        .btn:hover:not(:disabled) { opacity: .85; }

        .btn:active:not(:disabled) { transform: scale(.98); }

        .btn:disabled {
            opacity: .5;
            cursor: not-allowed;
        }

        /* ── Spinner ──────────────────────────────────────── */

        .spinner {
            width: 15px;
            height: 15px;
            border: 2px solid rgba(255,255,255,.25);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .6s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Footer ───────────────────────────────────────── */

        .card-footer {
            text-align: center;
            font-size: 12.5px;
            color: var(--text-muted);
            padding-top: 18px;
            border-top: 1px solid var(--border);
        }

        .card-footer a {
            color: var(--text);
            font-weight: 500;
            text-decoration: none;
            transition: opacity .15s;
        }

        .card-footer a:hover { opacity: .7; }

        /* ── Keyframes ────────────────────────────────────── */

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(-3px); }
            to   { opacity: 1; transform: none; }
        }

        /* ── Mobile (≤480px) ──────────────────────────────── */

        @media (max-width: 480px) {
            body { background: var(--bg-muted); }

            .page {
                align-items: flex-end;
                padding: 0;
                padding-top: 60px; /* space for fixed top bar */
            }

            .card {
                max-width: 100%;
                border-radius: 16px 16px 0 0;
                border-bottom: none;
                border-left: none;
                border-right: none;
                padding: 24px 20px 36px;
                animation: slideUp .35s cubic-bezier(.16,1,.3,1) both;
            }

            @keyframes slideUp {
                from { opacity: 0; transform: translateY(30px); }
                to   { opacity: 1; transform: none; }
            }

            .top-bar {
                display: flex !important;
            }
        }

        /* Fixed top bar — mobile only */
        .top-bar {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 52px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            align-items: center;
            padding: 0 20px;
            z-index: 50;
        }

        .top-bar .brand { margin-bottom: 0; }

        /* Tablet and up */
        @media (min-width: 481px) {
            .page { padding: 40px 24px; }
        }
    </style>
</head>
<body>

    <!-- Mobile top bar -->
    <div class="top-bar">
        <div class="brand">
            <div class="brand-mark">
                <svg viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            </div>
            <span class="brand-name">KiroBoost</span>
        </div>
    </div>

    <div class="page">
        <div class="card">

            <!-- Brand (hidden on mobile — shown in top bar instead) -->
            <div class="brand" id="desktopBrand">
                <div class="brand-mark">
                    <svg viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                </div>
                <span class="brand-name">KiroBoost</span>
            </div>

            <!-- Card header -->
            <div class="card-head">
                <h1 class="card-title">Sign in</h1>
                <p class="card-sub">Enter your credentials to access your account.</p>
            </div>

            <!-- Inputs -->
            <div class="form-fields">

                <!-- Username -->
                <div class="field">
                    <input
                        type="text"
                        id="username"
                        class="field-input"
                        placeholder=" "
                        autocomplete="username"
                        autocapitalize="none"
                        autocorrect="off"
                        spellcheck="false"
                    >
                    <label class="field-label" for="username">Username</label>
                </div>

                <!-- Password -->
                <div class="field">
                    <input
                        type="password"
                        id="password"
                        class="field-input has-icon"
                        placeholder=" "
                        autocomplete="current-password"
                    >
                    <label class="field-label" for="password">Password</label>
                    <button
                        class="eye-btn"
                        type="button"
                        id="eyeBtn"
                        onclick="togglePassword()"
                        tabindex="-1"
                        aria-label="Toggle password visibility"
                    >
                        <svg id="iconShow" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                        <svg id="iconHide" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24" style="display:none">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                        </svg>
                    </button>
                </div>

            </div>

            <!-- Forgot password -->
            <div class="row-forgot">
                <a href="#" class="link-forgot" onclick="alert('Please contact Support.'); return false;">
                    Forgot password?
                </a>
            </div>

            <!-- Error box -->
            <div class="error-box" id="errorBox" role="alert" aria-live="polite">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10"/>
                    <path stroke-linecap="round" d="M12 8v4m0 4h.01"/>
                </svg>
                <p id="errorText">Invalid credentials.</p>
            </div>

            <!-- Sign in button -->
            <button class="btn" id="loginBtn" type="button" onclick="login()">
                <span id="btnText">Sign in</span>
            </button>

            <!-- Footer -->
            <div class="card-footer">
                Don't have an account?&nbsp; <a href="/register">Create one</a>
            </div>

        </div>
    </div>

    <script>
        // ─── Redirect if already logged in ─────────────────
        (function () {
            if (localStorage.getItem('kb_token')) {
                window.location.href = '/home';
            }
        })();

        // ─── Hide desktop brand on mobile ──────────────────
        (function () {
            const brand = document.getElementById('desktopBrand');
            function checkMobile() {
                brand.style.display = window.innerWidth <= 480 ? 'none' : 'flex';
            }
            checkMobile();
            window.addEventListener('resize', checkMobile);
        })();

        // ─── Password toggle ────────────────────────────────
        function togglePassword() {
            const input    = document.getElementById('password');
            const iconShow = document.getElementById('iconShow');
            const iconHide = document.getElementById('iconHide');
            const isHidden = input.type === 'password';

            input.type           = isHidden ? 'text' : 'password';
            iconShow.style.display = isHidden ? 'none' : '';
            iconHide.style.display = isHidden ? '' : 'none';
        }

        // ─── Error helpers ───────────────────────────────────
        function showError(msg) {
            const box = document.getElementById('errorBox');
            document.getElementById('errorText').textContent = msg;
            box.classList.add('show');
        }

        function hideError() {
            document.getElementById('errorBox').classList.remove('show');
        }

        // ─── Login ───────────────────────────────────────────
        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn      = document.getElementById('loginBtn');
            const btnText  = document.getElementById('btnText');

            hideError();

            if (!username || !password) {
                showError('Please enter both username and password.');
                return;
            }

            // ── Loading state
            btn.disabled = true;
            btnText.style.display = 'none';
            const spinner = document.createElement('div');
            spinner.className = 'spinner';
            spinner.id = 'btnSpinner';
            btn.appendChild(spinner);

            try {
                const res = await fetch('/api/auth/login', {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({ username, password })
                });

                // Handle non-JSON gracefully
                const contentType = res.headers.get('content-type') || '';
                if (!contentType.includes('application/json')) {
                    throw new Error('Server error. Please try again.');
                }

                const data = await res.json();

                if (data.success && data.token) {
                    localStorage.setItem('kb_token', data.token);
                    if (data.user) localStorage.setItem('kb_user', JSON.stringify(data.user));
                    window.location.href = '/home';
                } else {
                    throw new Error(data.message || 'Login failed. Please try again.');
                }

            } catch (err) {
                showError(err.message || 'Connection error. Please try again.');
            } finally {
                // ── Restore button (unless navigating away)
                btn.disabled = false;
                btnText.style.display = '';
                const sp = document.getElementById('btnSpinner');
                if (sp) sp.remove();
            }
        }

        // ─── Enter key ───────────────────────────────────────
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') login();
        });
    </script>

</body>
</html>
