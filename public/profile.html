<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kiro Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Karla:wght@400;500;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'sans': ['Karla', 'sans-serif'],
                        'header': ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        'kiro-blue': '#007DFE',
                        'kiro-dark': '#0055aa',
                        'kiro-bg': '#F4F7F9',
                        'success': '#22C55E',
                        'error': '#DC2626',
                        'warning': '#F59E0B',
                    },
                    boxShadow: {
                        'card': '0 4px 12px rgba(0,0,0,0.05)',
                        'floating': '0 10px 25px -5px rgba(0, 125, 254, 0.4)',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F4F7F9; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none; }
        
        #app-wrapper {
            max-width: 480px;
            margin: 0 auto;
            background-color: #ffffff;
            min-height: 100vh;
            position: relative;
            padding-bottom: 90px;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* Smooth Tap Effect */
        .tap-effect:active { background-color: #f3f4f6; transition: background-color 0.1s; }
        
        /* Animations */
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <input type="file" id="imageInput" class="hidden" accept="image/*" onchange="handleImageUpload(event)">

    <div id="app-wrapper">
        
        <header class="bg-kiro-blue pt-10 pb-8 px-6">
            
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center gap-4">
                    <div onclick="changeAvatar()" class="w-[70px] h-[70px] bg-white rounded-full flex items-center justify-center text-kiro-blue font-header font-bold text-2xl relative overflow-hidden cursor-pointer shadow-lg border-2 border-white/20">
                        <span id="avatarText">--</span>
                        <img id="avatarImg" class="hidden w-full h-full object-cover" alt="Profile">
                    </div>
                    
                    <div class="text-white">
                        <h1 id="userName" class="font-header font-bold text-xl leading-tight mb-0.5">Loading...</h1>
                        <p id="userPhone" class="text-sm font-medium opacity-90 mb-1.5">--</p>
                        
                        <div class="flex items-center gap-1.5 bg-white/20 w-fit px-2.5 py-0.5 rounded-full backdrop-blur-sm border border-white/10">
                            <div class="bg-white rounded-full p-0.5">
                                <svg class="w-2.5 h-2.5 text-kiro-blue" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
                            </div>
                            <span id="userStatus" class="text-[10px] font-bold uppercase tracking-wider">Fully Verified</span>
                        </div>
                    </div>
                </div>
                
                <button class="text-white/80 hover:text-white transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>
            </div>

            <div class="flex gap-3">
                <a href="/limits" class="flex-1 text-center py-2.5 bg-transparent border border-white/40 text-white rounded-full text-sm font-bold hover:bg-white/10 transition active:scale-95">
                    View Benefits
                </a>
                <button onclick="alert('Activity history coming soon!')" class="flex-1 text-center py-2.5 bg-white text-kiro-blue rounded-full text-sm font-bold shadow-sm hover:bg-gray-50 transition active:scale-95">
                    My Activity
                </button>
            </div>

        </header>

        <main class="bg-kiro-bg min-h-full pb-6 pt-2">
            
            <div class="bg-white flex flex-col divide-y divide-gray-50 mb-3 shadow-sm">
                <a href="/limits" class="tap-effect flex items-center justify-between px-6 py-4 transition-colors">
                    <div class="flex items-center gap-4">
                        <svg class="w-6 h-6 text-kiro-blue" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
                        <span class="text-gray-800 font-semibold text-sm font-header">Profile Limits</span>
                    </div>
                    <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
                </a>

                <a href="/cookies" class="tap-effect flex items-center justify-between px-6 py-4 transition-colors">
                    <div class="flex items-center gap-4">
                        <svg class="w-6 h-6 text-kiro-blue" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
                        <span class="text-gray-800 font-semibold text-sm font-header">My Linked Accounts</span>
                    </div>
                    <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
                </a>
            </div>

            <div class="bg-white flex flex-col divide-y divide-gray-50 mb-3 shadow-sm">
                <div onclick="openSettings()" class="tap-effect flex items-center justify-between px-6 py-4 cursor-pointer">
                    <div class="flex items-center gap-4">
                        <svg class="w-6 h-6 text-kiro-blue" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        <span class="text-gray-800 font-semibold text-sm font-header">Settings</span>
                    </div>
                    <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
                </div>

                <a href="#" class="tap-effect flex items-center justify-between px-6 py-4 transition-colors">
                    <div class="flex items-center gap-4">
                        <svg class="w-6 h-6 text-kiro-blue" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <span class="text-gray-800 font-semibold text-sm font-header">Help</span>
                    </div>
                    <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
                </a>
            </div>

            <div class="bg-white shadow-sm mt-4">
                <div class="tap-effect flex items-center justify-center py-4 cursor-pointer" onclick="logout()">
                    <span class="text-kiro-blue font-bold text-sm font-header">Log Out</span>
                </div>
            </div>

            <p class="text-center text-[10px] text-gray-400 mt-8 font-mono">v1.0</p>

        </main>

        <nav class="fixed bottom-0 w-full max-w-[480px] bg-white border-t border-gray-100 pb-5 pt-2 px-4 flex justify-between items-end z-50 text-[10px] font-medium text-gray-400">
            <a href="/home" class="flex flex-col items-center w-1/5 hover:text-kiro-blue transition">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                <span>Home</span>
            </a>
            <a href="/inbox" class="flex flex-col items-center w-1/5 hover:text-kiro-blue transition">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                <span>Inbox</span>
            </a>
            <div class="w-1/5 relative flex justify-center group cursor-pointer tap-effect">
                <a href="/boost" class="absolute -top-8 bg-gradient-to-br from-[#007DFE] to-[#0055aa] w-14 h-14 rounded-2xl flex items-center justify-center text-white shadow-floating transform transition-all duration-300 group-hover:-translate-y-1">
                    <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                </a>
                <span class="mt-7 text-kiro-blue font-bold">Kiro</span>
            </div>
            <a href="/transactions" class="flex flex-col items-center w-1/5 hover:text-kiro-blue transition">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                <span>Orders</span>
            </a>
            <a href="/profile" class="flex flex-col items-center w-1/5 text-kiro-blue">
                <svg class="w-6 h-6 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                <span>Profile</span>
            </a>
        </nav>

    </div>

    <script>
        const token = localStorage.getItem('kb_token');
        if (!token) window.location.href = '/login';

        let user = JSON.parse(localStorage.getItem('kb_user') || '{}');

        // LOAD PROFILE DATA
        async function loadProfile() {
            try {
                const res = await fetch('/api/user/stats', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                
                if (data.success) {
                    const stats = data.stats;
                    user = { ...user, ...stats };
                    localStorage.setItem('kb_user', JSON.stringify(user));
                    
                    document.getElementById('userName').textContent = stats.username;
                    document.getElementById('userPhone').textContent = stats.plan === 'premium' ? 'Premium Member' : 'Free Member';
                    document.getElementById('avatarText').textContent = stats.username.substring(0, 2).toUpperCase();
                    
                    if (stats.profileImage) {
                        document.getElementById('avatarImg').src = stats.profileImage;
                        document.getElementById('avatarImg').classList.remove('hidden');
                        document.getElementById('avatarText').classList.add('hidden');
                    }
                    
                    const statusEl = document.getElementById('userStatus');
                    if (stats.isActive) {
                        statusEl.textContent = 'Fully Verified';
                    } else {
                        statusEl.textContent = 'Basic Level';
                        // Adjust badge style for unverified
                        statusEl.parentElement.classList.remove('bg-white/20');
                        statusEl.parentElement.classList.add('bg-black/20');
                    }
                }
            } catch (err) {
                console.error('Load error:', err);
                // Fallback to cache if offline
                if(user.username) document.getElementById('userName').textContent = user.username;
            }
        }

        // IMAGE UPLOAD HANDLER
        function changeAvatar() {
            document.getElementById('imageInput').click();
        }

        async function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (e) => {
                const imageData = e.target.result;
                // Instant UI Update
                document.getElementById('avatarImg').src = imageData;
                document.getElementById('avatarImg').classList.remove('hidden');
                document.getElementById('avatarText').classList.add('hidden');
                
                try {
                    await fetch('/api/user/profile/image', {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ imageData })
                    });
                } catch (err) {
                    alert('Failed to save image');
                }
            };
            reader.readAsDataURL(file);
        }

        // SETTINGS ALERT
        function openSettings() {
            alert('Settings functionality coming soon in v1.1');
        }

        // LOGOUT
        function logout() {
            if (confirm('Are you sure you want to log out?')) {
                localStorage.clear();
                window.location.href = '/login';
            }
        }

        loadProfile();
    </script>
</body>
</html>
