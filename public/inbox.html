<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KiroBoost - Inbox</title>
    <link rel="shortcut icon" href="img/fav-icon.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif !important; }
        *::selection { background: #4C4948 !important; color: #fff; }

        :root {
            --bg:      #000000;
            --card:    #111111;
            --card2:   #161616;
            --border:  rgba(255,255,255,0.08);
            --border2: rgba(255,255,255,0.13);
            --muted:   #B4B4B4;
            --muted2:  #555;
            --blue:    #3b82f6;
            --green:   #22c55e;
            --yellow:  #eab308;
            --purple:  #a855f7;
            --red:     #ef4444;
        }

        html, body { min-height: 100vh; background: var(--bg); color: #fff; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: #000; } ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }

        /* ── Navbar ── */
        #topnav {
            position: sticky; top: 0; z-index: 200;
            background: rgba(0,0,0,0.92);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 1.5rem; height: 60px; gap: 12px;
        }
        .kiro-logo { display: inline-flex; align-items: baseline; letter-spacing: -0.04em; user-select: none; text-decoration: none; }
        .logo-kiro  { font-weight: 800; color: #fff; font-style: italic; font-size: 1.4rem; }
        .logo-boost { font-weight: 300; color: rgba(255,255,255,0.4); font-size: 1.4rem; }
        .nav-back {
            display: flex; align-items: center; gap: 6px;
            color: var(--muted); font-size: 0.82rem; font-weight: 600;
            text-decoration: none; transition: color .2s; flex-shrink: 0;
        }
        .nav-back:hover { color: #fff; }
        .nav-title {
            font-size: 0.9rem; font-weight: 700;
            display: flex; align-items: center; gap: 8px;
        }

        /* ── Layout: sidebar + reader ── */
        #layout {
            display: grid;
            grid-template-columns: 340px 1fr;
            height: calc(100vh - 60px);
            overflow: hidden;
        }

        /* ── LEFT PANEL (message list) ── */
        #leftPanel {
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            overflow: hidden;
            background: var(--bg);
        }

        /* Filter + actions bar */
        .list-header {
            padding: .85rem 1rem;
            border-bottom: 1px solid var(--border);
            display: flex; flex-direction: column; gap: 8px;
            flex-shrink: 0;
        }

        .list-title-row {
            display: flex; align-items: center; justify-content: space-between;
        }
        .list-title {
            font-size: 1rem; font-weight: 800; letter-spacing: -0.02em;
            display: flex; align-items: center; gap: 8px;
        }
        .unread-count-badge {
            background: var(--blue);
            color: #fff;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 10px;
            display: none;
        }
        .unread-count-badge.show { display: inline-block; }

        .read-all-btn {
            background: none; border: none;
            color: var(--muted2); font-size: 0.72rem; font-weight: 600;
            cursor: pointer; transition: color .2s; white-space: nowrap;
            display: flex; align-items: center; gap: 4px;
        }
        .read-all-btn:hover { color: #fff; }

        /* Filter tabs */
        .filter-tabs {
            display: flex; gap: 4px;
            overflow-x: auto; scrollbar-width: none;
        }
        .filter-tabs::-webkit-scrollbar { display: none; }

        .ftab {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.72rem; font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            border: 1px solid transparent;
            transition: all .15s;
            color: var(--muted2);
            background: none;
        }
        .ftab:hover { color: var(--muted); background: rgba(255,255,255,.04); }
        .ftab.active {
            background: rgba(255,255,255,.1);
            border-color: var(--border2);
            color: #fff;
        }

        /* Message list */
        #msgList {
            flex: 1; overflow-y: auto;
        }

        .msg-row {
            display: flex; align-items: flex-start; gap: 10px;
            padding: .85rem 1rem;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background .15s;
            position: relative;
        }
        .msg-row:hover { background: rgba(255,255,255,.03); }
        .msg-row.active { background: rgba(255,255,255,.06); }
        .msg-row.active::before {
            content: '';
            position: absolute; left: 0; top: 0; bottom: 0;
            width: 3px;
            background: #fff;
            border-radius: 0 2px 2px 0;
        }

        /* Unread dot */
        .unread-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--blue);
            flex-shrink: 0; margin-top: 5px;
            opacity: 0;
        }
        .msg-row.unread .unread-dot { opacity: 1; }

        /* Type icon */
        .type-icon {
            width: 36px; height: 36px; border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; font-size: 0.8rem;
        }
        .type-icon.announcement { background: rgba(168,85,247,.15); color: #d8b4fe; }
        .type-icon.promo        { background: rgba(234,179,8,.15);   color: #fde68a; }
        .type-icon.general      { background: rgba(59,130,246,.15);  color: #93c5fd; }
        .type-icon.system       { background: rgba(255,255,255,.07); color: var(--muted); }

        .msg-body { flex: 1; min-width: 0; }
        .msg-title {
            font-size: 0.82rem; font-weight: 500;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            color: var(--muted);
        }
        .msg-row.unread .msg-title { color: #fff; font-weight: 700; }
        .msg-preview {
            font-size: 0.72rem; color: var(--muted2);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            margin-top: 2px; line-height: 1.4;
        }
        .msg-meta { display: flex; align-items: center; gap: 6px; margin-top: 3px; }
        .msg-time { font-size: 0.67rem; color: #3a3a3a; flex-shrink: 0; }
        .msg-type-chip {
            font-size: 0.6rem; font-weight: 700;
            padding: 1px 6px; border-radius: 10px;
            text-transform: uppercase; letter-spacing: .04em;
        }
        .chip-announcement { background: rgba(168,85,247,.12); color: #d8b4fe; }
        .chip-promo        { background: rgba(234,179,8,.12);   color: #fde68a; }
        .chip-general      { background: rgba(59,130,246,.12);  color: #93c5fd; }
        .chip-system       { background: rgba(255,255,255,.07); color: #666; }

        /* Delete hover btn on row */
        .msg-delete-btn {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            background: rgba(239,68,68,.1); border: none;
            color: #fca5a5; border-radius: 6px;
            width: 26px; height: 26px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; opacity: 0; transition: opacity .2s, background .2s;
            flex-shrink: 0;
        }
        .msg-row:hover .msg-delete-btn { opacity: 1; }
        .msg-delete-btn:hover { background: rgba(239,68,68,.22); }

        /* ── RIGHT PANEL (reader) ── */
        #rightPanel {
            display: flex; flex-direction: column;
            overflow: hidden;
            background: var(--bg);
        }

        /* Empty reader state */
        #readerEmpty {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: var(--muted2); gap: 10px;
            text-align: center; padding: 2rem;
        }
        #readerEmpty svg { opacity: .2; }
        #readerEmpty .empty-title { font-size: 0.9rem; font-weight: 600; color: #333; }
        #readerEmpty .empty-sub   { font-size: 0.78rem; }

        /* Message reader */
        #reader {
            flex: 1; overflow-y: auto;
            padding: 2rem;
            display: none;
        }
        #reader.open { display: block; }

        .reader-header {
            display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem;
            margin-bottom: 1.25rem;
        }
        .reader-title {
            font-size: 1.35rem; font-weight: 800;
            letter-spacing: -0.03em; line-height: 1.3;
        }
        .reader-actions { display: flex; gap: 8px; flex-shrink: 0; }
        .reader-action-btn {
            background: rgba(255,255,255,.06);
            border: 1px solid var(--border);
            color: var(--muted); border-radius: 8px;
            width: 34px; height: 34px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all .2s;
        }
        .reader-action-btn:hover { background: rgba(255,255,255,.1); color: #fff; border-color: var(--border2); }
        .reader-action-btn.delete:hover { background: rgba(239,68,68,.12); color: #fca5a5; border-color: rgba(239,68,68,.25); }

        .reader-meta {
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
            margin-bottom: 1.5rem; padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        .reader-from {
            display: flex; align-items: center; gap: 6px;
            font-size: 0.78rem; color: var(--muted2);
        }
        .reader-from-avatar {
            width: 22px; height: 22px; border-radius: 50%;
            background: rgba(255,255,255,.08);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.6rem; font-weight: 700; color: var(--muted);
        }
        .reader-datetime { font-size: 0.72rem; color: #3a3a3a; }

        /* Type badge */
        .reader-type-badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 3px 10px; border-radius: 20px;
            font-size: 0.7rem; font-weight: 700;
        }
        .rtb-announcement { background: rgba(168,85,247,.12); color: #d8b4fe; border: 1px solid rgba(168,85,247,.2); }
        .rtb-promo        { background: rgba(234,179,8,.12);   color: #fde68a; border: 1px solid rgba(234,179,8,.2); }
        .rtb-general      { background: rgba(59,130,246,.12);  color: #93c5fd; border: 1px solid rgba(59,130,246,.2); }
        .rtb-system       { background: rgba(255,255,255,.06); color: #666;    border: 1px solid var(--border); }

        /* Banner image */
        .reader-image {
            width: 100%; max-height: 260px;
            object-fit: cover; border-radius: 10px;
            margin-bottom: 1.25rem;
            display: block;
        }

        /* Content */
        .reader-content {
            font-size: 0.9rem; color: #ccc;
            line-height: 1.75; white-space: pre-wrap;
            word-break: break-word;
        }

        /* ── Skeleton ── */
        .skeleton {
            background: linear-gradient(90deg, #141414 25%, #1c1c1c 50%, #141414 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 5px;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* ── Empty state ── */
        .list-empty {
            padding: 3rem 1rem; text-align: center;
            color: var(--muted2); font-size: 0.82rem;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .list-empty svg { opacity: .2; }

        /* ── Toast ── */
        #toast {
            position: fixed; bottom: 1.5rem; right: 1.5rem;
            background: #111; border: 1px solid var(--border);
            border-radius: 10px; padding: .65rem 1rem;
            font-size: 0.82rem; font-weight: 500;
            display: flex; align-items: center; gap: 8px;
            z-index: 9999; max-width: 300px;
            transform: translateY(20px); opacity: 0;
            transition: transform .3s, opacity .3s;
            pointer-events: none;
        }
        #toast.show { transform: translateY(0); opacity: 1; }
        #toast.success { border-color: rgba(34,197,94,.3); color: #86efac; }
        #toast.error   { border-color: rgba(239,68,68,.3);  color: #fca5a5; }

        /* ── Mobile ── */
        @media (max-width: 700px) {
            #layout {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
            }
            #leftPanel {
                border-right: none;
                border-bottom: 1px solid var(--border);
                max-height: 45vh;
            }
            #rightPanel { min-height: 0; }
            #reader { padding: 1.25rem 1rem; }
            .reader-title { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<!-- ═══ NAVBAR ═══ -->
<nav id="topnav">
    <a href="/home" class="kiro-logo">
        <span class="logo-kiro">Kiro</span><span class="logo-boost">Boost</span>
    </a>
    <div class="nav-title">
        <svg data-testid="geist-icon" height="16" stroke-linejoin="round" viewBox="0 0 16 16" width="16" style="color:currentcolor"><path fill-rule="evenodd" clip-rule="evenodd" d="M14.5 3C14.5 3.82843 13.8284 4.5 13 4.5C12.1716 4.5 11.5 3.82843 11.5 3C11.5 2.17157 12.1716 1.5 13 1.5C13.8284 1.5 14.5 2.17157 14.5 3ZM13.5 5.95852C13.3374 5.9858 13.1704 6 13 6C11.3431 6 10 4.65685 10 3C10 2.82964 10.0142 2.6626 10.0415 2.5H4.75C3.50736 2.5 2.5 3.50736 2.5 4.75V11.25C2.5 12.4926 3.50736 13.5 4.75 13.5H11.25C12.4926 13.5 13.5 12.4926 13.5 11.25V5.95852ZM15 5.23611V11.25C15 13.3211 13.3211 15 11.25 15H4.75C2.67893 15 1 13.3211 1 11.25V4.75C1 2.67893 2.67893 1 4.75 1H10.7639C11.3132 0.386251 12.1115 0 13 0C14.6569 0 16 1.34315 16 3C16 3.8885 15.6137 4.68679 15 5.23611Z" fill="currentColor"></path></svg>
        Inbox
    </div>
    <a href="/home" class="nav-back">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        Home
    </a>
</nav>

<!-- ═══ LAYOUT ═══ -->
<div id="layout">

    <!-- ── LEFT: Message List ── -->
    <div id="leftPanel">

        <div class="list-header">
            <div class="list-title-row">
                <div class="list-title">
                    Messages
                    <span class="unread-count-badge" id="unreadBadge">0</span>
                </div>
                <button class="read-all-btn" onclick="markAllRead()" id="readAllBtn" title="Mark all as read">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/><polyline points="20 12 9 23 4 18"/></svg>
                    Mark all read
                </button>
            </div>
            <div class="filter-tabs">
                <button class="ftab active" data-filter="all"          onclick="switchFilter(this)">All</button>
                <button class="ftab"        data-filter="unread"       onclick="switchFilter(this)">Unread</button>
                <button class="ftab"        data-filter="announcements" onclick="switchFilter(this)">Announcements</button>
                <button class="ftab"        data-filter="promos"       onclick="switchFilter(this)">Promos</button>
            </div>
        </div>

        <div id="msgList">
            <!-- Skeleton loaders -->
            <div id="listSkeleton">
                ${Array(5).fill(0).map(() => `
                <div style="display:flex;align-items:flex-start;gap:10px;padding:.85rem 1rem;border-bottom:1px solid rgba(255,255,255,.06);">
                    <div class="skeleton" style="width:36px;height:36px;border-radius:9px;flex-shrink:0;"></div>
                    <div style="flex:1;display:flex;flex-direction:column;gap:6px;">
                        <div class="skeleton" style="height:11px;width:70%;"></div>
                        <div class="skeleton" style="height:9px;width:90%;"></div>
                        <div class="skeleton" style="height:8px;width:40%;"></div>
                    </div>
                </div>`).join('')}
            </div>
        </div>

    </div>

    <!-- ── RIGHT: Reader ── -->
    <div id="rightPanel">

        <!-- Empty state -->
        <div id="readerEmpty">
            <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                <path d="M13.73 21a2 2 0 01-3.46 0"/>
            </svg>
            <div class="empty-title">No message selected</div>
            <div class="empty-sub">Click a message to read it</div>
        </div>

        <!-- Reader -->
        <div id="reader">
            <div class="reader-header">
                <div class="reader-title" id="readerTitle">—</div>
                <div class="reader-actions">
                    <button class="reader-action-btn" onclick="markCurrentRead()" id="markReadBtn" title="Mark as read">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                    </button>
                    <button class="reader-action-btn delete" onclick="deleteCurrentMsg()" title="Delete">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                    </button>
                </div>
            </div>

            <div class="reader-meta">
                <span class="reader-type-badge" id="readerTypeBadge"></span>
                <div class="reader-from">
                    <div class="reader-from-avatar" id="readerFromAvatar">K</div>
                    <span id="readerFrom">KiroBoost</span>
                </div>
                <div class="reader-datetime" id="readerDatetime">—</div>
            </div>

            <img id="readerImage" class="reader-image" src="" alt="" style="display:none;">
            <div class="reader-content" id="readerContent"></div>
        </div>

    </div>

</div><!-- /layout -->

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
'use strict';

/* ── Auth ── */
const TOKEN    = localStorage.getItem('token') || localStorage.getItem('kb_token');
const USERNAME = localStorage.getItem('username');
if (!TOKEN) { window.location.href = '/login'; }

function authHeaders() {
    return { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' };
}
async function apiFetch(url, opts = {}) {
    const res = await fetch(url, { ...opts, headers: { ...authHeaders(), ...(opts.headers||{}) } });
    if (res.status === 401) { logout(); return null; }
    return res.json();
}

/* ── State ── */
let messages       = [];
let activeFilter   = 'all';
let activeMsgId    = null;
let unreadTotal    = 0;

/* ── Toast ── */
function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    const icon = type === 'success'
        ? `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`
        : `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
    el.className = `show ${type}`;
    el.innerHTML = icon + msg;
    clearTimeout(el._t);
    el._t = setTimeout(() => el.className = '', 3000);
}

/* ── Type helpers ── */
function typeIcon(type) {
    const icons = {
        announcement: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>`,
        promo:        `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
        general:      `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>`,
        system:       `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
    };
    return icons[type] || icons.general;
}

function typeClass(type) {
    return { announcement: 'announcement', promo: 'promo', general: 'general', system: 'system' }[type] || 'general';
}

function typeBadgeHtml(type) {
    const labels = { announcement: '📢 Announcement', promo: '⭐ Promo', general: '💬 Message', system: '🔔 System' };
    const cls    = { announcement: 'rtb-announcement', promo: 'rtb-promo', general: 'rtb-general', system: 'rtb-system' };
    return `<span class="reader-type-badge ${cls[type]||cls.general}">${labels[type]||labels.general}</span>`;
}

function chipHtml(type) {
    const labels = { announcement: 'Announce', promo: 'Promo', general: 'Message', system: 'System' };
    const cls    = { announcement: 'chip-announcement', promo: 'chip-promo', general: 'chip-general', system: 'chip-system' };
    return `<span class="msg-type-chip ${cls[type]||cls.general}">${labels[type]||'Message'}</span>`;
}

/* ── Render list ── */
function renderList() {
    const list = document.getElementById('msgList');
    document.getElementById('listSkeleton')?.remove();

    if (!messages.length) {
        list.innerHTML = `<div class="list-empty">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
            <span>No messages here</span>
        </div>`;
        return;
    }

    list.innerHTML = messages.map(m => `
        <div class="msg-row ${m.isRead ? '' : 'unread'} ${m.messageId === activeMsgId ? 'active' : ''}"
             id="row-${m.messageId}"
             onclick="openMessage('${m.messageId}')">
            <div class="unread-dot"></div>
            <div class="type-icon ${typeClass(m.type)}">${typeIcon(m.type)}</div>
            <div class="msg-body">
                <div class="msg-title">${escHtml(m.title)}</div>
                <div class="msg-preview">${escHtml(m.content)}</div>
                <div class="msg-meta">
                    ${chipHtml(m.type)}
                    <span class="msg-time">${m.date} · ${m.time}</span>
                </div>
            </div>
            <button class="msg-delete-btn" onclick="deleteMsg(event,'${m.messageId}')" title="Delete">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
    `).join('');
}

/* ── Open / read message ── */
async function openMessage(msgId) {
    // Mark active row immediately
    document.querySelectorAll('.msg-row').forEach(r => r.classList.remove('active'));
    const row = document.getElementById(`row-${msgId}`);
    if (row) row.classList.add('active');

    activeMsgId = msgId;

    // Fetch full content — server auto-marks as read
    const data = await apiFetch(`/api/user/inbox/${msgId}`);
    if (!data || !data.success) { toast('Failed to load message.', 'error'); return; }

    const m = data.message;

    // Update local unread state
    const local = messages.find(x => x.messageId === msgId);
    if (local && !local.isRead) {
        local.isRead = true;
        unreadTotal  = Math.max(0, unreadTotal - 1);
        updateUnreadBadge();
        // Remove unread class from row
        if (row) row.classList.remove('unread');
    }

    // Render reader
    document.getElementById('readerEmpty').style.display = 'none';
    const reader = document.getElementById('reader');
    reader.classList.add('open');

    document.getElementById('readerTitle').textContent    = m.title;
    document.getElementById('readerTypeBadge').outerHTML  = typeBadgeHtml(m.type) + `<span id="readerTypeBadge"></span>`;
    // Re-render badge properly
    const metaDiv = document.querySelector('.reader-meta');
    metaDiv.querySelector('.reader-type-badge').outerHTML = typeBadgeHtml(m.type);

    const fromEl = document.getElementById('readerFrom');
    fromEl.textContent = m.sentBy || 'KiroBoost';
    document.getElementById('readerFromAvatar').textContent = (m.sentBy || 'K').charAt(0).toUpperCase();
    document.getElementById('readerDatetime').textContent   = `${m.date} at ${m.time}`;

    // Banner image
    const imgEl = document.getElementById('readerImage');
    if (m.imageUrl) {
        imgEl.src = m.imageUrl;
        imgEl.style.display = 'block';
        imgEl.onerror = () => { imgEl.style.display = 'none'; };
    } else {
        imgEl.style.display = 'none';
    }

    document.getElementById('readerContent').textContent = m.content;

    // Mark read button — dim if already read
    document.getElementById('markReadBtn').style.opacity = m.isRead ? '0.3' : '1';
}

/* ── Mark current as read ── */
async function markCurrentRead() {
    if (!activeMsgId) return;
    const data = await apiFetch(`/api/user/inbox/${activeMsgId}/read`, { method: 'PUT' });
    if (data?.success) {
        const local = messages.find(x => x.messageId === activeMsgId);
        if (local && !local.isRead) {
            local.isRead = true;
            unreadTotal  = Math.max(0, unreadTotal - 1);
            updateUnreadBadge();
        }
        document.getElementById(`row-${activeMsgId}`)?.classList.remove('unread');
        document.getElementById('markReadBtn').style.opacity = '0.3';
        toast('Marked as read.');
    }
}

/* ── Delete from reader ── */
async function deleteCurrentMsg() {
    if (!activeMsgId) return;
    await deleteMsg(null, activeMsgId);
}

/* ── Delete from list ── */
async function deleteMsg(e, msgId) {
    if (e) { e.stopPropagation(); }
    const data = await apiFetch(`/api/user/inbox/${msgId}`, { method: 'DELETE' });
    if (!data?.success) { toast('Failed to delete.', 'error'); return; }

    // Remove from local list
    const idx = messages.findIndex(x => x.messageId === msgId);
    if (idx !== -1) {
        if (!messages[idx].isRead) unreadTotal = Math.max(0, unreadTotal - 1);
        messages.splice(idx, 1);
    }
    updateUnreadBadge();
    renderList();

    // If deleted the open one, reset reader
    if (msgId === activeMsgId) {
        activeMsgId = null;
        document.getElementById('reader').classList.remove('open');
        document.getElementById('readerEmpty').style.display = 'flex';
    }

    toast('Message deleted.');
}

/* ── Mark all read ── */
async function markAllRead() {
    const data = await apiFetch('/api/user/inbox/read-all', { method: 'PUT' });
    if (!data?.success) { toast('Failed.', 'error'); return; }
    messages.forEach(m => m.isRead = true);
    unreadTotal = 0;
    updateUnreadBadge();
    renderList();
    // Re-open current if open
    if (activeMsgId) document.getElementById('markReadBtn').style.opacity = '0.3';
    toast('All messages marked as read.');
}

/* ── Filter switch ── */
async function switchFilter(el) {
    document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    activeFilter = el.dataset.filter;
    activeMsgId  = null;
    document.getElementById('reader').classList.remove('open');
    document.getElementById('readerEmpty').style.display = 'flex';
    await loadMessages();
}

/* ── Update unread badge ── */
function updateUnreadBadge() {
    const badge = document.getElementById('unreadBadge');
    if (unreadTotal > 0) {
        badge.textContent = unreadTotal > 99 ? '99+' : unreadTotal;
        badge.classList.add('show');
    } else {
        badge.classList.remove('show');
    }
    // Show/hide read-all btn
    document.getElementById('readAllBtn').style.opacity = unreadTotal > 0 ? '1' : '0.3';
    document.getElementById('readAllBtn').style.pointerEvents = unreadTotal > 0 ? 'auto' : 'none';
}

/* ── Escape html ── */
function escHtml(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Logout ── */
function logout() {
    ['token','kb_token','userRole','username','kb_user'].forEach(k => localStorage.removeItem(k));
    window.location.href = '/login';
}

/* ── Load messages (GET /api/user/inbox) ── */
async function loadMessages() {
    // Show skeleton
    const list = document.getElementById('msgList');
    if (!list.querySelector('#listSkeleton')) {
        list.innerHTML = `<div id="listSkeleton">${Array(4).fill(0).map(() => `
            <div style="display:flex;align-items:flex-start;gap:10px;padding:.85rem 1rem;border-bottom:1px solid rgba(255,255,255,.05);">
                <div class="skeleton" style="width:36px;height:36px;border-radius:9px;flex-shrink:0;"></div>
                <div style="flex:1;display:flex;flex-direction:column;gap:6px;">
                    <div class="skeleton" style="height:11px;width:65%;"></div>
                    <div class="skeleton" style="height:9px;width:85%;"></div>
                    <div class="skeleton" style="height:8px;width:35%;"></div>
                </div>
            </div>`).join('')}</div>`;
    }

    const data = await apiFetch(`/api/user/inbox?filter=${activeFilter}&limit=100`);
    document.getElementById('listSkeleton')?.remove();

    if (!data || !data.success) {
        toast('Failed to load inbox.', 'error');
        list.innerHTML = `<div class="list-empty"><span>Failed to load messages.</span></div>`;
        return;
    }

    messages    = data.messages || [];
    unreadTotal = data.unreadCount || 0;
    updateUnreadBadge();
    renderList();
}

/* ── Init ── */
loadMessages();
</script>
