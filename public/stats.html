    <script>
        const token = localStorage.getItem('kboost_token');
        if (!token) {
            window.location.href = '/login';
        }

        function logout() {
            localStorage.removeItem('kboost_token');
            localStorage.removeItem('kboost_user');
            window.location.href = '/login';
        }

        async function loadStats() {
            try {
                const response = await fetch('/api/user/stats', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) {
                    if (response.status === 401) {
                        logout();
                        return;
                    }
                    throw new Error('Failed to load stats');
                }

                const data = await response.json();
                
                if (data.success) {
                    const stats = data.stats;
                    
                    // Update avatar
                    document.getElementById('userAvatar').textContent = stats.username.substring(0, 2).toUpperCase();
                    
                    // Update name
                    document.getElementById('userName').textContent = stats.username.toUpperCase();
                    
                    // Update status badge
                    const statusEl = document.getElementById('userStatus');
                    if (stats.isAdmin) {
                        statusEl.textContent = 'Admin';
                        statusEl.className = 'px-3 py-1 bg-purple-500 text-white text-sm rounded-full font-karla';
                    } else if (stats.isActive) {
                        statusEl.textContent = 'Active';
                        statusEl.className = 'px-3 py-1 bg-gcash-success text-white text-sm rounded-full font-karla';
                    } else {
                        statusEl.textContent = 'Inactive';
                        statusEl.className = 'px-3 py-1 bg-gcash-warning text-white text-sm rounded-full font-karla';
                    }

                    // Update stats
                    document.getElementById('totalShares').textContent = stats.totalShares || 0;
                    document.getElementById('cookieCount').textContent = stats.cookieCount || 0;

                    // Update info
                    document.getElementById('infoUsername').textContent = stats.username.toUpperCase();
                    document.getElementById('infoCountry').textContent = (stats.country || 'N/A').toUpperCase();
                    
                    const fbLink = document.getElementById('infoFacebook');
                    fbLink.textContent = stats.facebook || 'N/A';
                    if (stats.facebook) {
                        fbLink.href = stats.facebook.startsWith('http') ? stats.facebook : `https://${stats.facebook}`;
                    }

                    // Update account status
                    const infoStatus = document.getElementById('infoStatus');
                    if (stats.isAdmin) {
                        infoStatus.textContent = 'Admin';
                        infoStatus.className = 'px-3 py-1 rounded-full text-sm font-karla bg-purple-100 text-purple-600';
                    } else if (stats.isActive) {
                        infoStatus.textContent = 'Active';
                        infoStatus.className = 'px-3 py-1 rounded-full text-sm font-karla bg-green-100 text-green-600';
                    } else {
                        infoStatus.textContent = 'Inactive';
                        infoStatus.className = 'px-3 py-1 rounded-full text-sm font-karla bg-amber-100 text-amber-600';
                    }
                }
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        // Initialize
        loadStats();
    </script>
