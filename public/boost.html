<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kiro Boost</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Karla:wght@400;500;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'sans': ['Karla', 'sans-serif'],
                        'header': ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        'kiro-blue': '#007DFE',
                        'kiro-dark': '#0055aa',
                        'kiro-bg': '#F1F5F9',
                        'success': '#22C55E',
                        'error': '#DC2626',
                    },
                    boxShadow: {
                        'card': '0 2px 12px rgba(0,0,0,0.06)',
                        'floating': '0 10px 25px -5px rgba(0, 125, 254, 0.4)',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F1F5F9; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none; }
        
        #app-wrapper {
            max-width: 480px;
            margin: 0 auto;
            background-color: #ffffff;
            min-height: 100vh;
            position: relative;
            padding-bottom: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* Spinner */
        .spinner {
            border: 4px solid rgba(0, 125, 254, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #007DFE;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Custom Input */
        .kiro-input {
            display: flex;
            align-items: center;
            border: 1px solid #E5E7EB;
            border-radius: 0.5rem;
            height: 56px;
            background: #fff;
            transition: all 0.2s;
        }
        .kiro-input:focus-within { 
            border-color: #007DFE; 
            box-shadow: 0 0 0 1px #007DFE;
        }

        /* Horizontal Scroll Logic */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Cookie Bubble Logic */
        .cookie-bubble .avatar-circle { transition: all 0.2s; }
        .cookie-bubble.selected .avatar-circle {
            background-color: #0055aa; 
            ring: 3px solid #BFDBFE;
        }
        .cookie-bubble.selected .check-badge { display: flex; }
        
        /* Slide Animation */
        .slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="loader" class="hidden fixed inset-0 z-[60] flex items-center justify-center bg-black/30 backdrop-blur-[2px]">
        <div class="bg-white rounded-xl px-6 py-5 flex items-center gap-4 shadow-2xl w-[260px] animate-fade">
            <div class="spinner"></div>
            <span class="text-gray-700 font-sans font-medium text-lg tracking-tight">Processing . . .</span>
        </div>
    </div>

    <div id="app-wrapper">
        
        <header class="bg-kiro-blue text-white h-16 flex items-center justify-between px-4 shadow-sm sticky top-0 z-40">
            <a href="/home" class="p-1 hover:bg-white/20 rounded-full transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
            </a>
            <h1 class="font-header font-semibold text-lg tracking-wide">Kiro Boost</h1>
            <div class="w-6"></div>
        </header>

        <main class="p-4">

            <div id="formSection" class="slide-up">
                
                <div class="mb-6 bg-white border border-gray-100 p-3.5 rounded-2xl shadow-card flex items-center gap-3.5 relative overflow-hidden">
                    <div class="absolute right-0 top-0 w-24 h-full bg-gradient-to-l from-blue-50 to-transparent opacity-50"></div>
                    <div class="w-10 h-10 bg-black rounded-xl flex items-center justify-center text-[#B2D235] font-bold text-xs flex-shrink-0 z-10">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z" clip-rule="evenodd"/></svg>
                    </div>
                    <div class="flex-1 z-10">
                        <h3 class="font-bold text-sm text-gray-800 leading-tight">SMM Panel</h3>
                        <p class="text-[11px] text-gray-500 mt-0.5 font-medium">Zero Delays Sharing</p>
                    </div>
                    <button class="z-10 bg-kiro-blue text-white text-[11px] font-bold px-4 py-2 rounded-full shadow-md active:scale-95 transition-transform">
                        Boost Now!
                    </button>
                </div>

                <div class="mb-5">
                    <label class="block text-gray-700 font-bold font-header text-base mb-2">Boost to</label>
                    <div class="kiro-input overflow-hidden">
                        <div class="w-[60px] h-full bg-gray-50 border-r border-gray-100 flex items-center justify-center">
                            <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                        </div>
                        <input type="text" id="postLink" placeholder="Paste post link" class="flex-1 h-full px-4 text-sm text-gray-800 outline-none placeholder-gray-400 font-sans bg-transparent">
                        <div class="w-12 h-full flex items-center justify-center text-kiro-blue cursor-pointer active:opacity-60 hover:bg-gray-50 transition">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 21h7a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v11m0 5l4.879-4.879m0 0a3 3 0 104.243-4.242 3 3 0 00-4.243 4.242z"></path></svg>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3 mb-5">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1.5 ml-1 uppercase tracking-wide">Target Shares</label>
                        <div class="bg-white border border-gray-200 rounded-lg h-12 flex items-center px-3 focus-within:ring-1 focus-within:ring-blue-500 focus-within:border-blue-500 transition-all">
                            <input type="number" id="targetShares" placeholder="0" class="w-full text-sm outline-none font-bold text-gray-800 bg-transparent">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1.5 ml-1 uppercase tracking-wide">Customer Name</label>
                        <div class="bg-white border border-gray-200 rounded-lg h-12 flex items-center px-3 focus-within:ring-1 focus-within:ring-blue-500 focus-within:border-blue-500 transition-all">
                            <input type="text" id="customerName" placeholder="Optional" class="w-full text-sm outline-none text-gray-800 bg-transparent">
                        </div>
                    </div>
                </div>

                <div class="mb-8">
                    <label class="block text-xs font-bold text-gray-500 mb-1.5 ml-1 uppercase tracking-wide">Reference (Optional)</label>
                    <div class="bg-white border border-gray-200 rounded-lg h-12 flex items-center px-3 focus-within:ring-1 focus-within:ring-blue-500 focus-within:border-blue-500 transition-all">
                        <input type="text" id="referenceNote" placeholder="e.g. Order ID" class="w-full text-sm outline-none text-gray-800 bg-transparent">
                    </div>
                </div>

                <div class="mb-6">
                    <div class="flex justify-between items-end mb-3 px-1">
                        <p class="text-[11px] text-gray-500 font-medium">Tap contacts to select</p>
                        <span id="selectedCount" class="text-xs font-bold text-kiro-blue">0 selected</span>
                    </div>

                    <div id="cookieList" class="flex gap-4 overflow-x-auto no-scrollbar pb-4 px-1 min-h-[90px] items-center">
                        <div class="flex items-center justify-center w-full">
                            <div class="w-6 h-6 border-2 border-kiro-blue border-t-transparent rounded-full animate-spin"></div>
                        </div>
                    </div>
                    
                    <div class="text-center mt-1">
                        <button onclick="selectAllCookies()" class="text-xs text-kiro-blue font-bold active:opacity-60 transition">Select All Accounts</button>
                    </div>
                </div>

                <div id="errorBox" class="hidden mb-4 bg-red-50 border border-red-100 rounded-xl p-3 flex items-start gap-3 animate-pulse">
                    <div class="bg-red-100 p-1 rounded-full text-error">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    </div>
                    <p id="errorText" class="text-xs text-gray-700 font-medium pt-0.5 leading-relaxed">Error message goes here</p>
                </div>

                <button onclick="startBoost()" id="startBtn" class="w-full bg-kiro-blue text-white font-bold py-4 rounded-full text-base shadow-lg shadow-blue-200 active:bg-blue-700 transition transform active:scale-[0.98] flex justify-center items-center gap-2">
                    NEXT
                </button>
            </div>


            <div id="progressSection" class="hidden slide-up">
                
                <div class="bg-white rounded-t-3xl shadow-sm border border-gray-100 p-6 flex flex-col items-center relative z-10">
                    
                    <div class="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mb-4 relative">
                        <div id="statusDot" class="w-4 h-4 bg-success rounded-full border-2 border-white absolute top-0 right-0 animate-bounce"></div>
                        <svg class="w-8 h-8 text-kiro-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                    </div>

                    <h2 id="statusText" class="font-header font-bold text-xl text-gray-800 text-center">Processing Boost</h2>
                    <p class="text-xs text-gray-400 mt-1 mb-6">Please keep this window open</p>
                    
                    <div class="w-full border-t border-dashed border-gray-200 mb-6"></div>

                    <div class="w-full space-y-4">
                        <div class="flex justify-between items-center">
                            <span class="text-xs font-bold text-gray-400 uppercase tracking-wide">Target Shares</span>
                            <span id="receiptTarget" class="text-sm font-bold text-gray-800 font-sans">0</span>
                        </div>
                         <div class="flex justify-between items-center">
                            <span class="text-xs font-bold text-gray-400 uppercase tracking-wide">Progress</span>
                            <span id="progressText" class="text-sm font-bold text-kiro-blue font-sans">0%</span>
                        </div>
                        
                        <div class="w-full bg-gray-100 rounded-full h-2.5 mt-1 overflow-hidden">
                            <div id="progressBar" class="bg-success h-full rounded-full transition-all duration-500 ease-out" style="width: 0%"></div>
                        </div>

                        <div class="grid grid-cols-2 gap-4 mt-2">
                             <div class="bg-green-50 rounded-lg p-2 text-center border border-green-100">
                                <span class="block text-xs font-bold text-gray-400 uppercase">Success</span>
                                <span id="successCount" class="block text-lg font-bold text-success leading-none mt-1">0</span>
                            </div>
                             <div class="bg-red-50 rounded-lg p-2 text-center border border-red-100">
                                <span class="block text-xs font-bold text-gray-400 uppercase">Failed</span>
                                <span id="failCount" class="block text-lg font-bold text-error leading-none mt-1">0</span>
                            </div>
                        </div>
                        <div id="accountsCount" class="hidden">0</div>
                    </div>
                </div>

                <div class="h-4 bg-white relative w-full opacity-100" 
                     style="background: linear-gradient(135deg, transparent 6px, white 6px) 0 50%, linear-gradient(45deg, transparent 6px, white 6px) 0 50%; background-size: 12px 12px; background-repeat: repeat-x; transform: rotate(180deg); margin-top: -1px; filter: drop-shadow(0 2px 1px rgba(0,0,0,0.03));">
                </div>

                <div class="mt-6">
                    <div class="flex justify-between items-center px-2 mb-2">
                        <h3 class="font-header font-bold text-gray-800 text-sm">Activity Logs</h3>
                        <button onclick="clearLogs()" class="text-[10px] bg-gray-200 text-gray-600 px-2 py-1 rounded font-bold hover:bg-gray-300 transition">CLEAR</button>
                    </div>
                    <div id="logsContainer" class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 h-40 overflow-y-auto no-scrollbar space-y-2.5">
                        <p class="text-center text-xs text-gray-400 py-2 italic">Connecting to server...</p>
                    </div>
                </div>

                <div class="mt-8 px-4 flex gap-3">
                    <button onclick="stopBoost()" id="stopBtn" class="flex-1 bg-white border border-gray-200 text-gray-600 font-bold py-3.5 rounded-full text-sm active:bg-gray-50 transition">Cancel</button>
                    <button onclick="resetForm()" id="newOrderBtn" class="hidden flex-1 bg-kiro-blue text-white font-bold py-3.5 rounded-full text-sm shadow-lg active:scale-95 transition">New Boost</button>
                </div>
            </div>

        </main>
    </div>

    <script>
        const token = localStorage.getItem('kb_token');
        if (!token) window.location.href = '/login';

        // Base URL for CORS proxy - UPDATE THIS TO YOUR ACTUAL API DOMAIN
        const API_BASE = 'https://corsproxy.io/?https://kirobooster.onrender.com';

        let cookies = [];
        let currentSession = null;
        let pollInterval = null;

        // --- FETCH COOKIES ---
        async function loadCookies() {
            try {
                const res = await fetch(`${API_BASE}/api/user/cookies`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!res.ok) throw new Error("API Failed");
                const data = await res.json();
                
                if (data.success) {
                    cookies = data.cookies || [];
                    renderCookies();
                } else {
                    document.getElementById('cookieList').innerHTML = '<p class="text-xs text-error font-medium w-full text-center">Failed to load accounts</p>';
                }
            } catch (err) {
                document.getElementById('cookieList').innerHTML = '<p class="text-xs text-error font-medium w-full text-center">Connection Error</p>';
            }
        }

        // --- RENDER BUBBLES ---
        function renderCookies() {
            const container = document.getElementById('cookieList');
            
            if (cookies.length === 0) {
                container.innerHTML = '<p class="text-xs text-gray-400 w-full text-center">No active accounts found.</p>';
                return;
            }

            container.innerHTML = cookies.map((c, i) => `
                <div onclick="toggleCookie(${i})" class="cookie-bubble flex flex-col items-center flex-shrink-0 cursor-pointer group w-[74px] relative transition-transform active:scale-95" id="cookie-${i}">
                    <div class="avatar-circle w-[52px] h-[52px] bg-gray-100 text-kiro-blue rounded-full flex items-center justify-center font-bold text-lg mb-1.5 shadow-sm border border-gray-200 relative overflow-hidden">
                        ${c.name.charAt(0)}
                        <div class="check-badge hidden absolute inset-0 bg-kiro-blue/80 items-center justify-center text-white backdrop-blur-[1px]">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
                        </div>
                    </div>
                    <p class="text-[10px] text-center font-bold text-gray-700 leading-tight w-full truncate px-1">${c.name.split(' ')[0]}</p>
                    <p class="text-[8px] text-center text-gray-400 font-medium">${c.uid}</p>
                    <input type="checkbox" class="cookie-cb hidden" data-index="${i}">
                </div>
            `).join('');
        }

        function toggleCookie(index) {
            const card = document.getElementById(`cookie-${index}`);
            const cb = card.querySelector('.cookie-cb');
            cb.checked = !cb.checked;
            if(cb.checked) { card.classList.add('selected'); } else { card.classList.remove('selected'); }
            updateCount();
        }

        function selectAllCookies() {
            const cbs = document.querySelectorAll('.cookie-cb');
            const allChecked = Array.from(cbs).every(cb => cb.checked);
            cbs.forEach(cb => {
                cb.checked = !allChecked;
                const card = cb.closest('.cookie-bubble');
                if(!allChecked) card.classList.add('selected'); else card.classList.remove('selected');
            });
            updateCount();
        }

        function updateCount() {
            const count = document.querySelectorAll('.cookie-cb:checked').length;
            document.getElementById('selectedCount').textContent = `${count} selected`;
        }

        function getSelectedCookies() {
            return Array.from(document.querySelectorAll('.cookie-cb:checked')).map(cb => cookies[cb.dataset.index]);
        }

        function showError(msg) {
            const box = document.getElementById('errorBox');
            document.getElementById('errorText').textContent = msg;
            box.classList.remove('hidden');
            setTimeout(() => box.classList.add('hidden'), 4000);
        }

        function hideError() {
            document.getElementById('errorBox').classList.add('hidden');
        }

        // --- MAIN LOGIC (With Safety Checks) ---
        async function startBoost() {
            const loader = document.getElementById('loader');
            hideError();
            
            try {
                const selected = getSelectedCookies();
                const postLink = document.getElementById('postLink').value.trim();
                const targetShares = parseInt(document.getElementById('targetShares').value) || 0;
                const customerName = document.getElementById('customerName').value.trim() || 'Guest';
                const referenceNote = document.getElementById('referenceNote').value.trim();

                if (selected.length === 0) throw new Error('Please select at least one account');
                if (!postLink) throw new Error('Post Link is required');
                if (targetShares < 1) throw new Error('Enter a valid share target');

                // 1. Show Loader
                loader.classList.remove('hidden');

                // 2. Setup Receipt Screen
                document.getElementById('receiptTarget').textContent = targetShares;
                // Important: Fix for null error - ensure this ID exists or isn't called on form
                // We use hidden div in progress section for logic consistency
                document.getElementById('accountsCount').textContent = selected.length;

                // 3. UI Transition
                await new Promise(r => setTimeout(r, 1000));
                
                document.getElementById('formSection').classList.add('hidden');
                document.getElementById('progressSection').classList.remove('hidden');
                loader.classList.add('hidden');

                addLog('info', 'Connecting to system...');
                const validAccounts = [];

                // 4. Token Extraction
                for (const cookie of selected) {
                    try {
                        const res = await fetch(`${API_BASE}/share/extract-token`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ cookie: cookie.cookie, method: 'smm' })
                        });
                        const data = await res.json();
                        
                        if (data.success) {
                            validAccounts.push({ ...cookie, token: data.token });
                            addLog('success', `Verified: ${cookie.name}`);
                        } else {
                            addLog('error', `Token Invalid: ${cookie.name}`);
                        }
                    } catch {
                        addLog('error', `Network Error: ${cookie.name}`);
                    }
                }

                // FIX: If no accounts valid, stop immediately
                if (validAccounts.length === 0) {
                    addLog('error', 'CRITICAL: No valid tokens found.');
                    setFailedStatus();
                    return; 
                }

                // 5. Create Order
                try {
                    await fetch(`${API_BASE}/api/admin/orders`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ customerName, postLink, quantity: targetShares, referenceNote, amount: 0, speed: 'instant' })
                    });
                } catch (e) { console.error(e); }

                addLog('info', 'Dispatching batch...');
                
                // 6. Start Batch
                const batchRes = await fetch(`${API_BASE}/share/batch`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ accounts: validAccounts, postId: postLink, method: 'smm', targetCount: targetShares })
                });
                
                const batchData = await batchRes.json();
                
                if (batchData.success) {
                    currentSession = batchData.sessionId;
                    startPolling();
                } else {
                    addLog('error', 'Server rejected batch session.');
                    setFailedStatus();
                }

            } catch (err) {
                loader.classList.add('hidden');
                // If we are still on the form screen, show alert box
                if(!document.getElementById('formSection').classList.contains('hidden')) {
                    showError(err.message);
                } else {
                    addLog('error', err.message);
                    setFailedStatus();
                }
            }
        }

        function setFailedStatus() {
            document.getElementById('statusDot').className = 'w-4 h-4 bg-error rounded-full border-2 border-white absolute top-0 right-0';
            document.getElementById('statusText').textContent = 'Boost Failed';
            document.getElementById('statusText').classList.add('text-error');
            document.getElementById('stopBtn').classList.add('hidden');
            document.getElementById('newOrderBtn').classList.remove('hidden');
        }

        function startPolling() {
            pollInterval = setInterval(async () => {
                if (!currentSession) return;

                try {
                    const res = await fetch(`${API_BASE}/share/session/${currentSession}`);
                    const data = await res.json();

                    if (data.success) {
                        const target = data.targetCount || 1;
                        const percent = Math.min(Math.round((data.successCount / target) * 100), 100);
                        
                        document.getElementById('progressBar').style.width = percent + '%';
                        document.getElementById('progressText').textContent = percent + '%';
                        document.getElementById('successCount').textContent = data.successCount;
                        document.getElementById('failCount').textContent = data.failCount;

                        const lastLogs = data.logs.slice(-5);
                        lastLogs.forEach(log => {
                            if (!document.querySelector(`[data-log="${log.time}"]`)) {
                                addLog(log.success ? 'success' : 'error', `${log.account}: ${log.message}`, log.time);
                            }
                        });

                        if (data.status !== 'running') {
                            clearInterval(pollInterval);
                            const isComplete = data.status === 'completed';
                            
                            document.getElementById('statusDot').className = `w-4 h-4 rounded-full border-2 border-white absolute top-0 right-0 ${isComplete ? 'bg-success' : 'bg-warning'}`;
                            document.getElementById('statusText').textContent = isComplete ? 'Boost Complete' : 'Stopped';
                            document.getElementById('statusText').classList.remove('text-error');
                            document.getElementById('stopBtn').classList.add('hidden');
                            document.getElementById('newOrderBtn').classList.remove('hidden');
                            
                            // Finalize
                            await fetch(`${API_BASE}/api/share/complete`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                                body: JSON.stringify({ totalShares: data.successCount })
                            });
                        }
                    }
                } catch (err) {}
            }, 1000);
        }

        async function stopBoost() {
            if (currentSession) {
                await fetch(`${API_BASE}/share/session/${currentSession}/stop`, { method: 'POST' });
            }
        }

        function addLog(type, message, logTime) {
            const container = document.getElementById('logsContainer');
            if (container.querySelector('.text-center')) container.innerHTML = '';

            const div = document.createElement('div');
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            let color = 'text-gray-600';
            let border = 'border-gray-300';
            
            if(type === 'success') { color = 'text-green-700'; border = 'border-green-500'; }
            if(type === 'error') { color = 'text-red-700'; border = 'border-red-500'; }
            if(type === 'info') { color = 'text-kiro-blue'; border = 'border-blue-300'; }

            div.dataset.log = logTime || Date.now();
            div.className = `flex text-[10px] items-start gap-2 border-l-2 pl-2 ${border} animate-fade mb-2`;
            div.innerHTML = `
                <span class="text-gray-400 font-mono whitespace-nowrap pt-0.5">${time}</span>
                <span class="${color} font-medium break-all leading-tight">${message}</span>
            `;
            container.prepend(div);
        }

        function clearLogs() {
            document.getElementById('logsContainer').innerHTML = '<p class="text-center text-xs text-gray-400 py-2 italic">Logs cleared.</p>';
        }

        function resetForm() {
            currentSession = null;
            clearInterval(pollInterval);
            
            document.getElementById('formSection').classList.remove('hidden');
            document.getElementById('progressSection').classList.add('hidden');
            document.getElementById('stopBtn').classList.remove('hidden');
            document.getElementById('newOrderBtn').classList.add('hidden');
            
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('progressText').textContent = '0%';
            document.getElementById('successCount').textContent = '0';
            document.getElementById('failCount').textContent = '0';
            document.getElementById('receiptTarget').textContent = '0';
            document.getElementById('statusText').textContent = 'Processing Boost';
            document.getElementById('statusText').classList.remove('text-error');
            
            document.getElementById('postLink').value = '';
            document.getElementById('targetShares').value = '';
            document.getElementById('customerName').value = '';
            document.getElementById('referenceNote').value = '';
            
            document.querySelectorAll('.cookie-cb').forEach(cb => {
                cb.checked = false;
                cb.closest('.cookie-bubble').classList.remove('selected');
            });
            updateCount();
            clearLogs();
        }

        loadCookies();
    </script>
</body>
</html>
